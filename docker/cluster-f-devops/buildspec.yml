# AWS CodeBuild buildspec for the consolidated forge-devops image.
#
# IMPORTANT -- ECR repo name:
#   The ECS task definition (ForgeDataStack -> ForgeComputeStack) creates and
#   pulls the repository named `forge-devops` (repositoryName = task.name).
#   `forge-cluster-f-devops` is the *source* repo / imageRepo convention, NOT
#   the runtime ECR repo. To make the running task actually pick up this image
#   we push to ECR repo `forge-devops`. Override IMAGE_REPO_NAME if your account
#   genuinely uses a different runtime repo.
#
# Build environment: use an ARM/Graviton CodeBuild image so the native
#   `--platform linux/arm64` build runs without QEMU emulation, e.g.
#   environment:
#     type: ARM_CONTAINER
#     computeType: BUILD_GENERAL1_LARGE
#     image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
#     privilegedMode: true   # required for docker buildx
version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: "forge-devops"
    DOCKER_BUILDKIT: "1"
    BUILD_CONTEXT: "docker/cluster-f-devops"

phases:
  pre_build:
    commands:
      - AWS_REGION="${AWS_REGION:-${AWS_DEFAULT_REGION:-us-east-1}}"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - ECR_URI="${ECR_REGISTRY}/${IMAGE_REPO_NAME}"
      - BUILD_DATE=$(date -u +%Y%m%d-%H%M%S)
      - GIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
      - echo "Logging in to ECR ${ECR_REGISTRY}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
      - docker buildx create --name forge-builder --use 2>/dev/null || docker buildx use forge-builder
  build:
    commands:
      - echo "Building ${IMAGE_REPO_NAME} (linux/arm64) from ${BUILD_CONTEXT}"
      - |
        docker buildx build \
          --platform linux/arm64 \
          --tag "${ECR_URI}:latest" \
          --tag "${ECR_URI}:${BUILD_DATE}" \
          --tag "${ECR_URI}:${GIT_SHA}" \
          --build-arg BUILD_DATE="${BUILD_DATE}" \
          --build-arg GIT_SHA="${GIT_SHA}" \
          --push \
          "${BUILD_CONTEXT}"
  post_build:
    commands:
      - echo "Pushed ${ECR_URI}:latest (also :${BUILD_DATE}, :${GIT_SHA})"
      - echo "Run 'cdk deploy ForgeCompute-dev' then force a new deployment of the forge-devops service to pick up :latest"
