# Rendered at container start by forge-entrypoint.sh (envsubst).
# Public surface for the consolidated forge-devops task.
user www-data;
worker_processes ${NGINX_WORKERS};
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 512m;   # git pushes / large model artifacts

    upstream forgejo   { server 127.0.0.1:${FORGEJO_HTTP_PORT}; }
    upstream sysml_api { server 127.0.0.1:${SYSML_API_PORT}; }
    upstream minio_api { server 127.0.0.1:${MINIO_API_PORT}; }

    # ── Port 80: task health + routing front ─────────────────
    server {
        listen 80 default_server;
        server_name _;

        # Task-level health check (ECS healthCheckPath = /healthz).
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Forgejo (git.forge.local) under /git/ and at the vhost root when
        # the Host header is the Forgejo domain.
        location /git/ {
            proxy_pass http://forgejo/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SysML v2 API also reachable through :80 for convenience.
        location /sysml/ {
            proxy_pass http://sysml_api/;
            proxy_set_header Host            $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # MinIO S3 API passthrough (optional convenience path).
        location /minio/ {
            proxy_pass http://minio_api/;
            proxy_set_header Host            $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Forgejo virtual host (FORGEJO_DOMAIN) ────────────────
    server {
        listen 80;
        server_name ${FORGEJO_DOMAIN};
        location / {
            proxy_pass http://forgejo;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
