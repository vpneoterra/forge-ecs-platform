name: Tail hydrate diag logs (last N min)
on:
  workflow_dispatch:
    inputs:
      minutes:
        description: 'Look-back window in minutes'
        required: false
        default: '15'
      pattern:
        description: 'CloudWatch filter pattern (omit to use default)'
        required: false
        default: '?ATLAS-HYDRATE-DIAG ?AXIOM-BRIDGE ?circuit ?breaker ?Anthropic ?timeout ?aborted ?429 ?Connection'
permissions: {contents: read}
jobs:
  tail:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Filter forge-app logs
        run: |
          set -e
          MIN=${{ inputs.minutes }}
          PAT='${{ inputs.pattern }}'
          NOW_MS=$(date +%s%3N)
          START_MS=$(( NOW_MS - MIN*60*1000 ))
          echo "Window: $START_MS - $NOW_MS  ($MIN min lookback)"
          echo "Pattern: $PAT"
          echo
          aws logs filter-log-events \
            --log-group-name /forge/ecs/forge-app-test \
            --start-time "$START_MS" \
            --end-time "$NOW_MS" \
            --filter-pattern "$PAT" \
            --max-items 500 \
            --output json | python3 -c "
import json, sys, datetime
d = json.load(sys.stdin)
events = d.get('events', [])
print(f'matched events: {len(events)}')
print()
for e in events:
    ts = datetime.datetime.utcfromtimestamp(e['timestamp']/1000).isoformat()+'Z'
    msg = e['message'].rstrip()
    print(f'{ts} | {msg[:600]}')
"
