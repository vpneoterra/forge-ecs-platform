name: Tail hydrate diag logs
on:
  workflow_dispatch:
    inputs:
      minutes:
        description: Lookback minutes
        required: false
        default: "20"
permissions:
  contents: read
jobs:
  tail:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Filter forge-app logs for hydrate diagnostics
        env:
          MIN: ${{ inputs.minutes }}
        run: |
          set -e
          NOW_MS=$(date +%s%3N)
          START_MS=$(( NOW_MS - MIN*60*1000 ))
          echo "Window ${START_MS} to ${NOW_MS} lookback ${MIN} min"
          for PAT in "ATLAS-HYDRATE-DIAG" "AXIOM-BRIDGE" "circuit breaker" "Request timed out" "APIConnectionError" "Anthropic" "axiom_validation"; do
            echo
            echo "===== pattern $PAT ====="
            aws logs filter-log-events --log-group-name /forge/ecs/forge-app-test --start-time "$START_MS" --end-time "$NOW_MS" --filter-pattern "$PAT" --max-items 80 --output json > /tmp/lf.json || { echo "(filter failed)"; continue; }
            python3 -c "import json,datetime; d=json.load(open('/tmp/lf.json')); ev=d.get('events',[]); print('matched',len(ev)); [print(datetime.datetime.utcfromtimestamp(e['timestamp']/1000).isoformat()+'Z','|',e['message'].rstrip()[:500]) for e in ev[:60]]"
          done
