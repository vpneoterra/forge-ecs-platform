name: Check DKS Task Status

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'ECS task ID (short ID from task ARN)'
        required: true

env:
  AWS_REGION: us-east-1
  CLUSTER: forge-app-dev

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check task status
        run: |
          TASK_ARN="arn:aws:ecs:${{ env.AWS_REGION }}:266087050444:task/${{ env.CLUSTER }}/${{ github.event.inputs.task_id }}"
          echo "Checking task: $TASK_ARN"
          
          aws ecs describe-tasks \
            --cluster ${{ env.CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].{status:lastStatus,stopCode:stopCode,stopReason:stoppedReason,exitCode:containers[0].exitCode,startedAt:startedAt,stoppedAt:stoppedAt,cpu:cpu,memory:memory}' \
            --output json
