name: "ABC: Extract staged chunks to EFS"

# Phase 3 of ABC ingest. For each (format, chunk_id):
#   1. download s3://.../abc/${version}/raw/${format}/<file>.7z to /tmp
#   2. 7z extract into /data/datasets/abc/${version}/${format}/extracted/
#   3. walk the extracted tree, emit per-part manifest JSON to S3
#   4. trigger Supabase upsert (abc_parts, abc_files, abc_features)
#
# Container: python:3.11-slim-bookworm. apt mirrors are unreachable from this
# Fargate subnet, so we install awscli via pip and download a static 7zz
# binary from GitHub Releases (https://github.com/ip7z/7zip/releases).
#
# Prereq: abc-stage-to-s3.yml has staged the chunks for the same (version, format).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ABC dataset version"
        required: true
        default: "v00"
        type: string
      formats:
        description: "Comma-separated formats to extract (meta,step,para,stl2,obj,feat,stat,ofs)"
        required: true
        default: "meta,step,feat,stat"
        type: string
      chunk_range:
        description: "Chunk ID range, e.g. '0-0' (smoke), '0-9'. Inclusive."
        required: true
        default: "0-0"
        type: string
      task_cpu:
        description: "Fargate vCPU units"
        required: false
        default: "4096"
        type: string
      task_memory:
        description: "Fargate memory in MiB"
        required: false
        default: "8192"
        type: string
      task_ephemeral_gib:
        description: "Fargate ephemeral disk for the .7z download (GiB)"
        required: false
        default: "32"
        type: string

env:
  AWS_REGION: us-east-1
  CLUSTER: forge-app-dev
  SECURITY_GROUP: sg-0871ce467d6c10739

jobs:
  extract:
    name: "Extract chunks onto EFS"
    runs-on: ubuntu-latest
    timeout-minutes: 600
    outputs:
      manifest_uri: ${{ steps.launch.outputs.manifest_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket + subnet
        id: env
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="forge-platform-data-${ACCOUNT}-${{ env.AWS_REGION }}"
          SUBNET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='ForgePublicSubnetIds-dev'].Value" --output text | cut -d',' -f1)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "subnet=$SUBNET" >> "$GITHUB_OUTPUT"
          RUN_KEY="abc/${{ inputs.version }}/runs/extract-${{ github.run_id }}.json"
          echo "run_key=$RUN_KEY" >> "$GITHUB_OUTPUT"

      - name: Plan formats + chunks
        id: plan
        run: |
          set -euo pipefail
          FORMATS="${{ inputs.formats }}"
          if [ "${{ inputs.chunk_range }}" = "all" ]; then
            START=0; END=99
          else
            START=$(echo "${{ inputs.chunk_range }}" | cut -d'-' -f1)
            END=$(echo "${{ inputs.chunk_range }}"   | cut -d'-' -f2)
          fi
          echo "formats=$FORMATS"     >> "$GITHUB_OUTPUT"
          echo "chunk_start=$START"   >> "$GITHUB_OUTPUT"
          echo "chunk_end=$END"       >> "$GITHUB_OUTPUT"

      - name: Upload container script to S3
        id: payload
        run: |
          set -euo pipefail
          BUCKET="${{ steps.env.outputs.bucket }}"
          KEY="abc/${{ inputs.version }}/scripts/${{ github.run_id }}/container_extract.py"
          aws s3 cp scripts/abc/container_extract.py "s3://$BUCKET/$KEY" --no-progress --only-show-errors
          echo "script_uri=s3://$BUCKET/$KEY" >> "$GITHUB_OUTPUT"
          echo "::notice::Script: s3://$BUCKET/$KEY"

      - name: Launch Fargate extract task
        id: launch
        run: |
          set -euo pipefail
          # Latest ACTIVE revision of the family — same fix as stage workflow.
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition dks-download \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Task def: $TASK_DEF"

          BUCKET="${{ steps.env.outputs.bucket }}"
          RUN_KEY="${{ steps.env.outputs.run_key }}"
          SCRIPT_URI="${{ steps.payload.outputs.script_uri }}"

          # Bootstrap: install awscli via pip, fetch script from S3, run it.
          # 7zz binary is fetched inside the python script over HTTPS.
          BOOTSTRAP="set -euo pipefail; echo \"=== ABC extract-to-efs \$(date -u) ===\"; pip install --quiet --no-cache-dir --root-user-action=ignore awscli boto3 pyyaml; aws s3 cp \"\$ABC_SCRIPT_URI\" /tmp/run.py --no-progress --only-show-errors; exec python3 /tmp/run.py"

          OVERRIDES=$(jq -nc \
            --argjson cpu "${{ inputs.task_cpu }}" \
            --argjson mem "${{ inputs.task_memory }}" \
            --argjson eph "${{ inputs.task_ephemeral_gib }}" \
            --arg cmd      "$BOOTSTRAP" \
            --arg bucket   "$BUCKET" \
            --arg version  "${{ inputs.version }}" \
            --arg formats  "${{ steps.plan.outputs.formats }}" \
            --arg cstart   "${{ steps.plan.outputs.chunk_start }}" \
            --arg cend     "${{ steps.plan.outputs.chunk_end }}" \
            --arg runkey   "$RUN_KEY" \
            --arg script   "$SCRIPT_URI" \
            '{
              cpu: ($cpu|tostring),
              memory: ($mem|tostring),
              ephemeralStorage: { sizeInGiB: $eph },
              containerOverrides: [{
                name:"downloader", cpu:$cpu, memory:$mem,
                command:["bash","-c",$cmd],
                environment: [
                  {name:"ABC_BUCKET",      value:$bucket},
                  {name:"ABC_VERSION",     value:$version},
                  {name:"ABC_FORMATS",     value:$formats},
                  {name:"ABC_CHUNK_START", value:$cstart},
                  {name:"ABC_CHUNK_END",   value:$cend},
                  {name:"ABC_RUN_KEY",     value:$runkey},
                  {name:"ABC_SCRIPT_URI",  value:$script}
                ]
              }]
             }')

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.CLUSTER }} \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE --platform-version LATEST \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.env.outputs.subnet }}],securityGroups=[${{ env.SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' --output text)
          TASK_ID=$(echo "$TASK_ARN" | rev | cut -d'/' -f1 | rev)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "task_id=$TASK_ID"   >> "$GITHUB_OUTPUT"
          echo "manifest_uri=s3://$BUCKET/$RUN_KEY" >> "$GITHUB_OUTPUT"
          echo "::notice::Task ID: $TASK_ID  Manifest: s3://$BUCKET/$RUN_KEY"

      - name: Monitor task
        id: monitor
        run: |
          TASK_ARN="${{ steps.launch.outputs.task_arn }}"
          TASK_ID="${{ steps.launch.outputs.task_id }}"
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          TIMEOUT=21600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text 2>/dev/null || echo UNKNOWN)
            echo "[$((ELAPSED/60))m] $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              EXIT=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
                --query 'tasks[0].containers[0].exitCode' --output text)
              REASON=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              echo "exit=$EXIT reason=$REASON"
              echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
              [ "$EXIT" = "0" ] && exit 0
              echo "::error::Extract task failed (exit $EXIT): $REASON"
              exit 1
            fi
            sleep 30; ELAPSED=$((ELAPSED + 30))
          done
          echo "::error::Timeout"; exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          TASK_ID="${{ steps.launch.outputs.task_id }}"
          STREAM="dks-download/downloader/$TASK_ID"
          echo "=== CloudWatch /forge/ecs/dks-ingest stream $STREAM ==="
          aws logs get-log-events \
            --log-group-name /forge/ecs/dks-ingest \
            --log-stream-name "$STREAM" \
            --start-from-head \
            --limit 500 \
            --query 'events[].message' --output text 2>&1 | tail -300 || true

  upsert-index:
    name: "Upsert abc_parts / abc_files / abc_features into Supabase"
    needs: extract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3 psycopg[binary]==3.2.* pyyaml
      - name: Upsert
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python scripts/abc/upsert_extract.py \
            --manifest-uri "${{ needs.extract.outputs.manifest_uri }}" \
            --version "${{ inputs.version }}"
