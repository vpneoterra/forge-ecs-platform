name: Cancel stuck CloudFormation update

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'Stack name to cancel update'
        required: true
        default: 'ForgeApp-dev'

env:
  AWS_REGION: us-east-1

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check stack status
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name ${{ github.event.inputs.stack_name }} \
            --query 'Stacks[0].StackStatus' --output text)
          echo "Current status: $STATUS"

      - name: Cancel update
        run: |
          echo "Cancelling update on ${{ github.event.inputs.stack_name }}..."
          aws cloudformation cancel-update-stack --stack-name ${{ github.event.inputs.stack_name }} || true
          echo "Waiting for rollback to complete..."
          aws cloudformation wait stack-update-rollback-complete \
            --stack-name ${{ github.event.inputs.stack_name }} || true

      - name: Final status
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name ${{ github.event.inputs.stack_name }} \
            --query 'Stacks[0].StackStatus' --output text)
          echo "Final status: $STATUS"
