name: "ABC: Fetch CloudWatch logs (debug helper)"

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "ECS task ID (last path component of the task ARN)"
        required: true
        type: string
      lines:
        description: "Number of trailing lines to print"
        required: false
        default: "500"
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Search every log group
        id: find
        shell: bash
        run: |
          set +e
          TASK_ID="${{ inputs.task_id }}"
          ALL_GROUPS=$(aws logs describe-log-groups --query 'logGroups[].logGroupName' --output text | tr '\t' '\n')
          echo "=== inspecting $(echo "$ALL_GROUPS" | wc -l) log groups for $TASK_ID ==="
          MATCHED_GROUP=""
          MATCHED_STREAM=""
          while IFS= read -r G; do
            [ -z "$G" ] && continue
            STREAMS=$(aws logs describe-log-streams \
              --log-group-name "$G" \
              --order-by LastEventTime --descending \
              --limit 50 \
              --query 'logStreams[].logStreamName' --output text 2>/dev/null | tr '\t' '\n')
            FOUND=$(echo "$STREAMS" | grep "$TASK_ID" | head -1)
            if [ -n "$FOUND" ]; then
              echo "MATCH: $G :: $FOUND"
              MATCHED_GROUP="$G"
              MATCHED_STREAM="$FOUND"
              break
            fi
          done <<< "$ALL_GROUPS"
          echo "matched_group=$MATCHED_GROUP" >> "$GITHUB_OUTPUT"
          echo "matched_stream=$MATCHED_STREAM" >> "$GITHUB_OUTPUT"
      - name: Dump matched log stream
        if: steps.find.outputs.matched_stream != ''
        run: |
          aws logs get-log-events \
            --log-group-name "${{ steps.find.outputs.matched_group }}" \
            --log-stream-name "${{ steps.find.outputs.matched_stream }}" \
            --limit ${{ inputs.lines }} \
            --query 'events[].message' --output text 2>&1
