name: "Flip MAESTRO_ENABLED / CONDUCTOR_ENABLED / CONDUCTOR_SHADOW_MODE"
# ================================================================
# flip-maestro-conductor.yml — Flip three env vars on forge-app-test
# and force a new deployment.
#
# Modeled on patch-dks-ingest-td.yml — registers a new task-def
# revision via the AWS ECS API. CDK env blocks are NOT read at
# runtime by deploy-app.yml (the merge-from-.aws/task-definition-test.json
# branch silently no-ops because that file lives in forgenew, not
# forge-ecs-platform), so this workflow is the only reliable runtime
# flip path for these vars.
#
# 2026-05-05: extended with CONDUCTOR_SHADOW_MODE to complete the
# Phase 4 cutover that was missed when CONDUCTOR_ENABLED was flipped
# on 2026-04-22. Code default in server/axiom/conductor.js is TRUE
# (`SHADOW_MODE = process.env.CONDUCTOR_SHADOW_MODE !== 'false'`),
# so prod ran in shadow for 13+ days before this var was added here.
#
# Safe + idempotent: re-running with the same inputs produces the
# same env block. Rollback is printed at the end.
# ================================================================

on:
  workflow_dispatch:
    inputs:
      maestro_enabled:
        description: "MAESTRO_ENABLED value"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      conductor_enabled:
        description: "CONDUCTOR_ENABLED value"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      conductor_shadow_mode:
        description: "CONDUCTOR_SHADOW_MODE value (false = Phase 4 active)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: forge-app-dev
  ECS_SERVICE: forge-app-test

jobs:
  flip:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: test
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 1. Snapshot current task-def for rollback
      - name: Snapshot current task definition
        id: snapshot
        run: |
          CUR_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          echo "Current TD ARN: $CUR_ARN"
          echo "current_arn=$CUR_ARN" >> "$GITHUB_OUTPUT"
          aws ecs describe-task-definition --task-definition "$CUR_ARN" \
            --query taskDefinition > /tmp/taskdef.json
          jq '.revision' /tmp/taskdef.json

      # 2. Patch env vars (desired state, not delta) using jq
      - name: Build patched task definition
        env:
          MAESTRO_ENABLED: ${{ github.event.inputs.maestro_enabled }}
          CONDUCTOR_ENABLED: ${{ github.event.inputs.conductor_enabled }}
          CONDUCTOR_SHADOW_MODE: ${{ github.event.inputs.conductor_shadow_mode }}
        run: |
          jq --arg M "$MAESTRO_ENABLED" --arg C "$CONDUCTOR_ENABLED" --arg S "$CONDUCTOR_SHADOW_MODE" '
            .containerDefinitions |= (map(
              if .name == "forge-app" then
                .environment |= (
                  (map(select(.name != "MAESTRO_ENABLED" and .name != "CONDUCTOR_ENABLED" and .name != "CONDUCTOR_SHADOW_MODE")))
                  + [{"name":"MAESTRO_ENABLED","value":$M},
                     {"name":"CONDUCTOR_ENABLED","value":$C},
                     {"name":"CONDUCTOR_SHADOW_MODE","value":$S}]
                )
              else . end
            ))
            | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                  .compatibilities,.registeredAt,.registeredBy)
          ' /tmp/taskdef.json > /tmp/taskdef-new.json
          echo "Patched forge-app env (preview):"
          jq '.containerDefinitions[] | select(.name=="forge-app") | .environment
              | map(select(.name=="MAESTRO_ENABLED" or .name=="CONDUCTOR_ENABLED" or .name=="CONDUCTOR_SHADOW_MODE"))' \
              /tmp/taskdef-new.json

      # 3. Register new revision
      - name: Register new task definition
        id: register
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "New revision: $NEW_ARN"
          echo "new_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      # 4. Deploy (force new tasks)
      - name: Update service (force new deployment)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.new_arn }}" \
            --force-new-deployment >/dev/null
          echo "Update issued."

      # 5. Wait for steady state
      - name: Wait for steady state
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Service is stable."

      # 6. Verify diagnostics endpoint
      - name: Verify maestro diagnostics
        run: |
          for i in 1 2 3 4 5; do
            RESP=$(curl -sf https://forge.qrucible.ai/api/maestro/diagnostics || true)
            if [ -n "$RESP" ]; then
              echo "Attempt $i OK:"
              echo "$RESP" | jq '{enabled, harness_enabled, active_runs}'
              ENABLED=$(echo "$RESP" | jq -r '.enabled // "null"')
              if [ "$ENABLED" = "true" ]; then
                echo "::notice::MAESTRO enabled=true confirmed."
                exit 0
              fi
              echo "enabled is $ENABLED — waiting..."
            else
              echo "Attempt $i: empty/non-2xx response, retrying in 10s..."
            fi
            sleep 10
          done
          echo "::error::Diagnostics did not report enabled=true within budget."
          exit 1

      # 7. Print rollback command
      - name: Print rollback command
        if: always()
        run: |
          echo "::notice::Rollback (if needed):"
          echo "aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE \\"
          echo "  --task-definition '${{ steps.snapshot.outputs.current_arn }}' --force-new-deployment"
