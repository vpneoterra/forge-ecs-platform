name: Build Geometry Container Images

on:
  workflow_dispatch:
    inputs:
      target_image:
        description: 'Specific image to build (leave empty for all)'
        required: false
        default: ''
      source_ref:
        # PRE-MERGE TESTING ONLY: build from a feature branch of the source repo
        # (e.g. forgenew) before that branch is merged to main. Leave empty to
        # use the source repo's default branch (the normal case).
        description: 'Source repo ref (branch/tag/SHA). Empty = default branch.'
        required: false
        default: ''
      target_env:
        # 'dev' (default) = blue, UNCHANGED (pushes to <ecr_name>).
        # 'dev2' = green = pushes to <ecr_name>-dev2 so green tracks its builds.
        description: 'Target env: dev (blue, default) or dev2 (green)'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - dev2
  schedule:
    # Weekly Wednesday 6am UTC — refresh geometry base images (blue/dev only)
    - cron: '0 6 * * 3'

env:
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Every entry's dockerfile MUST exist in vpneoterra/forgenew AND the
        # capability MUST be consumed by lib/forge-geometry-stack.ts. The phantom
        # forge-brep / forge-sdf-gpu / forge-neural-sdf entries were removed because
        # forgenew has no docker/brep, docker/sdf-gpu, or docker/neural-sdf directory
        # — they never built (buildx lstat failures) and, under fail-fast:false, only
        # read as routine noise. forge-fluxtk (CAP_FLUXTK in geometry-manifest.ts) is
        # the real solver image present in forgenew and is now built here. The
        # pre-build existence check below guards against future matrix drift.
        image:
          - name: forge-fluxtk
            repo: forge-fluxtk
            source_repo: forgenew
            dockerfile: docker/fluxtk/Dockerfile
            platforms: linux/amd64
            ecr_name: forge-fluxtk

          - name: forge-picogk
            repo: forge-picogk
            source_repo: forgenew
            dockerfile: docker/picogk/Dockerfile
            platforms: linux/amd64
            ecr_name: forge-picogk

    steps:
      - name: Check if this image should build
        id: filter
        run: |
          TARGET="${{ github.event.inputs.target_image }}"
          if [ -z "$TARGET" ] || [ "$TARGET" = "${{ matrix.image.name }}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.filter.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.should_build == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (for multi-arch builds)
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - uses: actions/checkout@v4
        if: steps.filter.outputs.should_build == 'true'
        with:
          repository: vpneoterra/${{ matrix.image.source_repo }}
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}
          path: image-source

      # Fail fast and loudly if a matrix entry points at a Dockerfile that does not
      # exist in the checked-out source repo. This converts buildx's late, opaque
      # `lstat ... no such file or directory` into an explicit, named error and
      # prevents the matrix from silently drifting out of sync with forgenew again.
      # This is a correctness gate — it MUST fail the job, never swallow.
      - name: Verify Dockerfile exists in source repo
        if: steps.filter.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          DF="image-source/${{ matrix.image.dockerfile }}"
          REF="${{ github.event.inputs.source_ref }}"
          if [ ! -f "$DF" ]; then
            echo "::error::Dockerfile ${{ matrix.image.dockerfile }} not found in forgenew@${REF:-default} — matrix entry ${{ matrix.image.name }} is stale"
            exit 1
          fi
          echo "Found ${{ matrix.image.dockerfile }} for ${{ matrix.image.name }}"

      - name: Set image metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          # Env-scope the ECR repo: dev (default) keeps the bare name (blue
          # unchanged); dev2 appends -dev2 (green's geometry repos).
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          ENV_SUFFIX=""
          if [ "$TARGET_ENV" = "dev2" ]; then ENV_SUFFIX="-dev2"; fi
          REPO_NAME="${{ matrix.image.ecr_name }}${ENV_SUFFIX}"
          ECR_URI=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${REPO_NAME}
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "Target env: ${TARGET_ENV:-dev}  ->  ECR repo: ${REPO_NAME}"
          echo "build_date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./image-source
          file: ./image-source/${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:latest
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.git_sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}

      - name: Image vulnerability scan summary
        if: steps.filter.outputs.should_build == 'true'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Checking ECR scan results for ${{ steps.meta.outputs.repo_name }}..."
          # Brief wait for scan to complete (non-blocking — just informational)
          sleep 30
          aws ecr describe-image-scan-findings \
            --repository-name ${{ steps.meta.outputs.repo_name }} \
            --image-id imageTag=latest \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output table 2>/dev/null || echo "Scan not yet complete — check ECR console"

  notify:
    name: Notify build complete
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## Geometry Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Geometry images (forge-fluxtk, forge-picogk) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

      # [RC-C] A failed geometry-image build means the FluxTK/SDF/BREP solver images
      # are stale or missing — the run-e26fb9d9 condition where the geometry tier could
      # not produce manifold geometry (FluxTK Not Solved, assembly_blocked_no_geometry).
      # Page on it via the SAME forge-deploy-alerts SNS topic the OMNI backlog liveness
      # alarm (#137 RC-3) uses, so a broken geometry image alerts instead of silently
      # leaving FluxTK unsolved. Fires ONLY on a non-success build result.
      - name: Configure AWS credentials
        if: needs.build.result != 'success'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Alert on geometry build failure (RC-C — forge-deploy-alerts)
        if: needs.build.result != 'success'
        run: |
          set -euo pipefail
          TOPIC_ARN="${{ secrets.SNS_TOPIC_ARN || 'arn:aws:sns:us-east-1:266087050444:forge-deploy-alerts' }}"
          aws sns publish \
            --topic-arn "${TOPIC_ARN}" \
            --subject "FORGE geometry image build FAILED (${{ needs.build.result }})" \
            --message "Build Geometry Container Images result=${{ needs.build.result }} on ref ${GITHUB_REF_NAME:-?} (run ${GITHUB_RUN_ID}). The geometry solver images (forge-brep / forge-neural-sdf / forge-fluxtk / forge-picogk) may be stale or missing, so the geometry tier (FluxTK/SDF/BREP) cannot produce manifold geometry — this surfaces downstream as 'FluxTK Not Solved' / assembly_blocked_no_geometry. Investigate: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --no-cli-pager
          echo "::error::Geometry image build failed (${{ needs.build.result }}) — paged forge-deploy-alerts. Geometry solver images are stale/missing (RC-C)."
          exit 1
