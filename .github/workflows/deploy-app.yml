# ============================================================
# deploy-app.yml — Deploy to ECS after image build succeeds
# Chains: CI ✓ → Build Images ✓ → Deploy App
# Also supports manual dispatch for rollback/re-deploy.
# Target: 1–3 minutes (just task def + force-new-deployment).
# ============================================================
name: Deploy App

on:
  workflow_run:
    workflows: [Build Images]
    types: [completed]
    branches: [main, test]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to deploy — leave blank for latest'
        required: false
        type: string
      omni_image_digest:
        description: 'OMNI image digest to deploy (sha256:...). REQUIRED to roll OMNI. Leave blank to deploy app only.'
        required: false
        type: string

concurrency:
  group: deploy-app-test
  cancel-in-progress: false          # don't cancel mid-deploy

env:
  AWS_REGION: us-east-1
  ECR_REPO: forge-app-test
  ECS_CLUSTER: forge-app-dev
  ECS_SERVICE: forge-app-test

jobs:
  deploy:
    name: Deploy to ECS (test)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: resolve
        run: |
          # Manual dispatch can override; otherwise use the build commit
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          else
            TAG="${{ github.sha }}"
          fi
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "image_uri=${REGISTRY}/${{ env.ECR_REPO }}:${TAG}" >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Deploying tag: ${TAG}"
          # NOTE: OMNI's image is built by a separate pipeline (forge-omni repo)
          # and uses its own commit SHAs — not the forgenew SHA. Stamping the
          # forgenew SHA onto OMNI's task definition produces a non-existent
          # ECR reference that breaks OMNI on the next pull (restart, scale,
          # AZ rebalance). The `Update OMNI ECS service` step below now deploys
          # OMNI by an explicit, verified @sha256 digest (workflow input
          # `omni_image_digest`) — NEVER the mutable `:latest` tag (RC2-A). The
          # OMNI build pipeline passes the digest it just pushed and verified.
          # See: incident on 2026-04-26 (OMNI restart blocked by stale image
          # tag 4829cb96... which was a forgenew commit SHA) and program
          # 253f20a6 (`:latest` digest overwritten then GC'd -> fleet bricked).

      # ── App service ─────────────────────────────────────────
      - name: Update app ECS task definition
        id: update-app-td
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          IMAGE_URI: ${{ steps.resolve.outputs.image_uri }}
          IMAGE_TAG: ${{ steps.resolve.outputs.image_tag }}
        run: |
          echo "Cluster: ${CLUSTER}"
          echo "Service: ${{ env.ECS_SERVICE }}"
          echo "Image:   ${IMAGE_URI}"

          CURRENT_TD=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "Current task definition: ${CURRENT_TD}"

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TD}" \
            --query 'taskDefinition' > /tmp/td.json

          python3 -c "
          import json, os
          with open('/tmp/td.json') as f:
            td = json.load(f)
          td['containerDefinitions'][0]['image'] = os.environ['IMAGE_URI']
          # Merge env vars from repo task-definition file
          try:
            with open('.aws/task-definition-test.json') as f:
              repo_td = json.load(f)
            repo_envs = {e['name']: e['value'] for e in repo_td.get('containerDefinitions', [{}])[0].get('environment', [])}
            existing_envs = {e['name']: e for e in td['containerDefinitions'][0].get('environment', [])}
            for name, value in repo_envs.items():
              if name in existing_envs:
                existing_envs[name]['value'] = value
              else:
                td['containerDefinitions'][0].setdefault('environment', []).append({'name': name, 'value': value})
            print(f'Merged {len(repo_envs)} env vars from .aws/task-definition-test.json')
            # Merge secrets from repo task-definition file
            repo_secrets = {s['name']: s['valueFrom'] for s in repo_td.get('containerDefinitions', [{}])[0].get('secrets', [])}
            existing_secrets = {s['name']: s for s in td['containerDefinitions'][0].get('secrets', [])}
            for name, value_from in repo_secrets.items():
              if name in existing_secrets:
                existing_secrets[name]['valueFrom'] = value_from
              else:
                td['containerDefinitions'][0].setdefault('secrets', []).append({'name': name, 'valueFrom': value_from})
            print(f'Merged {len(repo_secrets)} secrets from .aws/task-definition-test.json')
          except Exception as e:
            print(f'Warning: Could not merge repo task-definition: {e}')
          # Inject IMAGE_TAG
          image_tag = os.environ.get('IMAGE_TAG', '')
          if image_tag:
            env_list = td['containerDefinitions'][0].setdefault('environment', [])
            existing = {e['name']: e for e in env_list}
            if 'IMAGE_TAG' in existing:
              existing['IMAGE_TAG']['value'] = image_tag
            else:
              env_list.append({'name': 'IMAGE_TAG', 'value': image_tag})
            print(f'Injected IMAGE_TAG={image_tag}')
          # Add forge-monitor-sidecar container (CloudWatch agent)
          # Add monitoring sidecar container
          sidecar = {
            'name': 'forge-monitor-sidecar',
            'image': 'amazon/cloudwatch-agent:latest',
            'essential': False,
            'environment': [
              {'name': 'FORGE_APP_URL', 'value': 'http://localhost:3000'}
            ],
            'logConfiguration': {
              'logDriver': 'awslogs',
              'options': {
                'awslogs-group': '/forge/ecs/forge-app-test',
                'awslogs-region': 'us-east-1',
                'awslogs-stream-prefix': 'forge-monitor'
              }
            }
          }
          # Replace existing sidecar if present, otherwise append
          existing_names = [c['name'] for c in td['containerDefinitions']]
          if 'forge-monitor-sidecar' in existing_names:
            idx = existing_names.index('forge-monitor-sidecar')
            td['containerDefinitions'][idx] = sidecar
            print('Updated existing forge-monitor-sidecar container')
          else:
            td['containerDefinitions'].append(sidecar)
            print('Added forge-monitor-sidecar container')
          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes', 'compatibilities', 'registeredAt', 'registeredBy']:
            td.pop(key, None)
          with open('/tmp/new-td.json', 'w') as f:
            json.dump(td, f)
          "

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-td.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: ${NEW_TD_ARN}"
          echo "new_td_arn=${NEW_TD_ARN}" >> $GITHUB_OUTPUT

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment

          echo "App deployment triggered"

      # ── OMNI service ────────────────────────────────────────
      # RC2-A/RC2-C: OMNI must be deployed by an IMMUTABLE @sha256 digest, never
      # by the mutable `:latest` tag. The prior version resolved `forge-omni:latest`
      # -> digest, which is the exact mechanism that bricked the fleet: the digest
      # `:latest` pointed to was overwritten by a later (often EMPTY) push and then
      # GC'd, leaving running tasks with CannotPullContainerError. This step now
      # requires an explicit pushed digest (workflow input), verifies the pushed
      # artifact is a real (non-empty) image, and pins the task def to that digest.
      # If OMNI cannot be rolled with a verified immutable image, the step FAILS
      # loudly — it does NOT swallow-to-pass with `exit 0`.
      - name: Update OMNI ECS service
        if: ${{ github.event.inputs.omni_image_digest != '' }}
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          OMNI_DIGEST_INPUT: ${{ github.event.inputs.omni_image_digest }}
          MIN_IMAGE_BYTES: '524288000'   # 500 MB floor; real OMNI images are ~1.7 GB
        run: |
          set -euo pipefail

          # 1. The digest is supplied explicitly by the OMNI build pipeline (the
          # digest it just pushed and verified). Validate its shape — no coercion.
          OMNI_DIGEST="${OMNI_DIGEST_INPUT}"
          if ! printf '%s' "${OMNI_DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::omni_image_digest='${OMNI_DIGEST}' is not a valid 'sha256:<64-hex>' digest. Pass the exact digest the build pushed (RC2-A)."
            exit 1
          fi

          # 1b. Verify the digest exists in ECR and references a REAL image (not an
          # empty/manifest-only push). This gates the deploy on a non-empty artifact.
          SIZE=$(aws ecr describe-images \
            --repository-name forge-omni \
            --image-ids imageDigest="${OMNI_DIGEST}" \
            --query 'imageDetails[0].imageSizeInBytes' \
            --output text 2>/dev/null || echo "")
          if [ -z "${SIZE}" ] || [ "${SIZE}" = "None" ]; then
            echo "::error::Digest ${OMNI_DIGEST} not found in forge-omni ECR repo (or has no layers). Refusing to deploy (RC2-A/RC2-C)."
            exit 1
          fi
          if [ "${SIZE}" -lt "${MIN_IMAGE_BYTES}" ]; then
            echo "::error::Image ${OMNI_DIGEST} is ${SIZE} bytes, below the ${MIN_IMAGE_BYTES}-byte floor for a real OMNI image (RC2-C empty image). Refusing to deploy."
            exit 1
          fi

          OMNI_URI="${REGISTRY}/forge-omni@${OMNI_DIGEST}"
          echo "Deploying OMNI by verified digest: ${OMNI_URI} (${SIZE} bytes)"

          # 2. Find the current OMNI task definition. If the service does not exist
          # yet, that is a real error when an OMNI roll was explicitly requested.
          CURRENT_TD=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "forge-omni" \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null) || true

          if [ -z "$CURRENT_TD" ] || [ "$CURRENT_TD" = "None" ]; then
            echo "::error::forge-omni service not found in cluster ${CLUSTER}; cannot roll OMNI. Deploy the CDK stack first."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TD}" \
            --query 'taskDefinition' > /tmp/omni-td.json

          # 3. Decide whether the image actually needs updating. If the
          # current task def already points at the same digest, skip the
          # task def churn entirely (no service event, no rollout).
          CURRENT_IMAGE=$(python3 -c "
          import json
          td = json.load(open('/tmp/omni-td.json'))
          for c in td['containerDefinitions']:
              if c['name'] == 'omni-api':
                  print(c['image'])
                  break
          ")
          echo "Current OMNI image: ${CURRENT_IMAGE}"

          if [ "$CURRENT_IMAGE" = "$OMNI_URI" ]; then
            echo "OMNI task def already pinned to ${OMNI_DIGEST} — no churn needed."
            exit 0
          fi

          # 4. Patch the image, register a new revision, force redeploy.
          OMNI_URI="${OMNI_URI}" python3 -c "
          import json, os
          td = json.load(open('/tmp/omni-td.json'))
          for c in td['containerDefinitions']:
              if c['name'] == 'omni-api':
                  c['image'] = os.environ['OMNI_URI']
          for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes', 'compatibilities', 'registeredAt', 'registeredBy', 'deregisteredAt']:
              td.pop(key, None)
          json.dump(td, open('/tmp/new-omni-td.json', 'w'))
          "

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-omni-td.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "New OMNI task def: ${NEW_TD_ARN}"

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "forge-omni" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment > /dev/null

          echo "OMNI deployment triggered"

      # ── Wait & verify ───────────────────────────────────────
      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" || {
            echo "Warning: Service may still be stabilizing"
            aws ecs describe-services \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --services "${{ env.ECS_SERVICE }}" \
              --query 'services[0].events[:5]' \
              --output table
          }

      - name: Verify deployment was not rolled back
        env:
          EXPECTED_TD: ${{ steps.update-app-td.outputs.new_td_arn }}
        run: |
          echo "Expected task definition: ${EXPECTED_TD}"

          DEPLOY_INFO=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].deployments[?status==`PRIMARY`] | [0]' \
            --output json)

          PRIMARY_TD=$(echo "$DEPLOY_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('taskDefinition',''))")
          ROLLOUT_STATE=$(echo "$DEPLOY_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('rolloutState','UNKNOWN'))")

          echo "PRIMARY task definition: ${PRIMARY_TD}"
          echo "Rollout state: ${ROLLOUT_STATE}"

          if [ "$ROLLOUT_STATE" = "FAILED" ]; then
            echo "::error::Deployment FAILED — ECS circuit breaker rolled back the deployment"
            exit 1
          fi

          if [ "$PRIMARY_TD" != "$EXPECTED_TD" ]; then
            echo "::error::Deployment rolled back — PRIMARY task def (${PRIMARY_TD}) does not match expected (${EXPECTED_TD})"
            exit 1
          fi

          echo "Deployment verified: PRIMARY deployment is running the expected task definition"

      - name: Health check & summary
        if: always()
        run: |
          sleep 15

          # Resolve ALB DNS from CloudFormation
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name ForgeApp-dev \
            --query "Stacks[0].Outputs[?ExportName=='ForgeTestAlbDns-dev'].OutputValue" \
            --output text 2>/dev/null || echo "pending")

          if [ -n "$ALB_DNS" ] && [ "$ALB_DNS" != "None" ] && [ "$ALB_DNS" != "pending" ]; then
            echo "Testing ALB endpoint: https://${ALB_DNS}/health"
            curl --fail --silent --retry 5 --retry-delay 10 -L "https://${ALB_DNS}/health" || \
              echo "Warning: Health check pending (service may still be starting)"
          fi

          {
            echo "### Deployment Summary (test)"
            echo "- Service: \`${{ env.ECS_SERVICE }}\`"
            echo "- Image: \`${{ steps.resolve.outputs.image_uri }}\`"
            echo "- OMNI digest: \`${{ github.event.inputs.omni_image_digest || '(not rolled this run)' }}\`"
            echo "- ALB: \`${ALB_DNS}\`"
            echo "- Domain: \`forge.qrucible.ai\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Post-deploy hooks ─────────────────────────────────────
      - name: Enable ECS Exec for live debugging
        if: success()
        run: |
          echo "Enabling ECS Exec on forge-app-test service..."
          aws ecs update-service \
            --cluster forge-app-dev \
            --service forge-app-test \
            --enable-execute-command \
            --no-cli-pager || echo "ECS Exec enablement failed (non-fatal)"
          echo "✅ ECS Exec enabled. Connect with:"
          echo "  TASK_ID=\$(aws ecs list-tasks --cluster forge-app-dev --service-name forge-app-test --query 'taskArns[0]' --output text)"
          echo "  aws ecs execute-command --cluster forge-app-dev --task \$TASK_ID --container forge-app --interactive --command /bin/sh"

      - name: Create/update CloudWatch 5xx alarm
        if: success()
        run: |
          echo "Configuring 5xx rate alarm..."
          aws cloudwatch put-metric-alarm \
            --alarm-name forge-app-5xx-rate \
            --namespace AWS/ApplicationELB \
            --metric-name HTTPCode_Target_5XX_Count \
            --statistic Sum \
            --period 60 \
            --threshold 10 \
            --comparison-operator GreaterThanThreshold \
            --evaluation-periods 2 \
            --alarm-actions "${{ secrets.SNS_TOPIC_ARN || 'arn:aws:sns:us-east-1:266087050444:forge-deploy-alerts' }}" \
            --no-cli-pager || echo "Alarm creation failed (non-fatal)"
          echo "✅ CloudWatch 5xx alarm configured"

      # ── OMNI target-health gate (RC-A) ───────────────────────
      # The /api/bomgen/health smoke check below is transitively OMNI-dependent: the
      # forge-app->OMNI bridge (parseOmniBase(), server/omni-cem-bridge.js) resolves
      # OMNI via OMNI_API_URL (forge-app-stack.ts:563-571), so when OMNI is unreachable
      # bomgen returns ENOTFOUND and the whole deploy fails as an INDIRECT symptom with
      # no OMNI-specific signal — exactly the slow-to-triage "forge-omni OFFLINE"
      # condition of run e26fb9d9. This gate makes "OMNI has zero healthy targets" a
      # NAMED, leading, build-failing error that runs BEFORE the bomgen-dependent check.
      # It does NOT soften anything: zero healthy OMNI targets is a real deploy failure.
      - name: Verify OMNI target health (RC-A — bomgen smoke depends on OMNI)
        if: success()
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          OMNI_SERVICE: forge-omni
        run: |
          set -euo pipefail
          echo "Resolving OMNI ALB target group from service ${OMNI_SERVICE} in ${CLUSTER}..."
          TG_ARN=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${OMNI_SERVICE}" \
            --query 'services[0].loadBalancers[0].targetGroupArn' \
            --output text)
          if [ -z "${TG_ARN}" ] || [ "${TG_ARN}" = "None" ]; then
            echo "::error::OMNI service ${OMNI_SERVICE} in cluster ${CLUSTER} has no ALB target group (service missing or not ALB-attached). The bomgen-dependent smoke check cannot pass while OMNI is unreachable. Deploy the OMNI/app CDK stack first (RC-A)."
            exit 1
          fi
          echo "OMNI target group: ${TG_ARN}"

          # Count targets the ALB considers healthy on the OmniTarget /api/health check.
          HEALTHY=$(aws elbv2 describe-target-health \
            --target-group-arn "${TG_ARN}" \
            --query "length(TargetHealthDescriptions[?TargetHealth.State=='healthy'])" \
            --output text)
          echo "Healthy OMNI targets (/api/health): ${HEALTHY}"

          if [ "${HEALTHY}" -lt 1 ] 2>/dev/null; then
            echo "::error::OMNI has ZERO healthy targets in ${TG_ARN}. forge-omni is OFFLINE — the render tier is not serving, so /api/bomgen/health will fail and the whole pipeline (queue -> geometry -> assembly -> DQI) is starved. Refusing to certify the deploy (RC-A)."
            echo "Current OMNI target states:"
            aws elbv2 describe-target-health \
              --target-group-arn "${TG_ARN}" \
              --query 'TargetHealthDescriptions[*].{target:Target.Id,port:Target.Port,state:TargetHealth.State,reason:TargetHealth.Reason,desc:TargetHealth.Description}' \
              --output table
            exit 1
          fi
          echo "✅ OMNI has ${HEALTHY} healthy target(s) — bomgen-dependent smoke check may proceed"

      - name: Post-deploy smoke tests
        if: success()
        run: |
          echo "Running post-deploy smoke tests against forge.qrucible.ai..."
          DOMAIN="https://forge.qrucible.ai"
          FAILED=0

          # Health check
          echo -n "  /health ... "
          if curl -sf "$DOMAIN/health" | jq -e '.status' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "❌"
            FAILED=$((FAILED + 1))
          fi

          # OMNI render-tier health (RC-A) — CRITICAL, same contract as /health.
          # /api/bomgen/health below is transitively OMNI-dependent, so probe OMNI
          # directly first: a NAMED leading failure instead of an indirect bomgen
          # symptom. On run e26fb9d9 forge-omni was OFFLINE and this would have named
          # it immediately. Counted in FAILED — OMNI down is a real deploy failure.
          echo -n "  omni.qrucible.ai/api/health ... "
          if curl -sf "https://omni.qrucible.ai/api/health" | jq -e '.status' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "❌"
            FAILED=$((FAILED + 1))
          fi

          # Design Studio API (non-blocking — see Monitoring Guide §7 U7:
          # /api/design-studio/project-config/test is a pre-existing 404/503 and
          # is unrelated to deploy health. Report status but do not fail the build.)
          echo -n "  /api/design-studio/project-config/test ... "
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DOMAIN/api/design-studio/project-config/test" || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ ($STATUS)"
          else
            echo "⚠️ ($STATUS) — pre-existing, non-blocking (§7 U7)"
          fi

          # Traces API (non-blocking — pre-existing per Monitoring Guide §7 U7)
          echo -n "  /api/traces ... "
          if curl -sf "$DOMAIN/api/traces" | jq -e '.traces' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "⚠️ — pre-existing, non-blocking (§7 U7)"
          fi

          # BomGen health
          echo -n "  /api/bomgen/health ... "
          if curl -sf "$DOMAIN/api/bomgen/health" | jq -e '.status' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "❌"
            FAILED=$((FAILED + 1))
          fi

          # DKS health (non-blocking — may not be deployed yet)
          echo -n "  /api/knowledge/health ... "
          if curl -sf "$DOMAIN/api/knowledge/health" | jq -e '.status' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "⚠️ (DKS not available — non-blocking)"
          fi

          # Monitor hub
          echo -n "  /api/monitor/hub/health ... "
          if curl -sf "$DOMAIN/api/monitor/hub/health" | jq -e '.status' > /dev/null 2>&1; then
            echo "✅"
          else
            echo "❌"
            FAILED=$((FAILED + 1))
          fi

          echo ""
          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED critical smoke test(s) failed (health / omni / bomgen / monitor-hub)"
            echo "   Non-blocking endpoints (project-config/test, traces, knowledge) are excluded from this count."
            exit 1
          fi
          echo "✅ All critical smoke tests passed"
