name: Fix OMNI Deploy (delete failed stack + redeploy)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete failed ForgeOmni-dev stack
        run: |
          set +e
          echo "Checking ForgeOmni-dev stack status..."
          STATUS=$(aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Current status: $STATUS"
          
          if [ "$STATUS" = "DOES_NOT_EXIST" ]; then
            echo "Stack doesn't exist, proceeding with fresh deploy."
            exit 0
          fi

          if [ "$STATUS" = "DELETE_IN_PROGRESS" ]; then
            echo "Stack deletion already in progress, waiting..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev || true
            # Check if it ended in DELETE_FAILED
            STATUS=$(aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "Status after wait: $STATUS"
          fi

          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
            echo "Deleting failed stack (normal delete)..."
            aws cloudformation delete-stack --stack-name ForgeOmni-dev
            echo "Waiting for deletion..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev
            echo "Stack deleted."
            exit 0
          fi

          if [ "$STATUS" = "ROLLBACK_FAILED" ]; then
            echo "Stack in ROLLBACK_FAILED state. Attempting normal delete first..."
            aws cloudformation delete-stack --stack-name ForgeOmni-dev
            echo "Waiting for deletion to complete (may fail on stuck resources)..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev 2>/dev/null || true
            sleep 5
            
            # Check if we're now in DELETE_FAILED
            STATUS=$(aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "Status after first delete attempt: $STATUS"
            
            if [ "$STATUS" = "DOES_NOT_EXIST" ]; then
              echo "Stack successfully deleted."
              exit 0
            fi
            
            if [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Stack in DELETE_FAILED — now using --retain-resources for stuck resources..."
              RETAIN=$(aws cloudformation describe-stack-resources --stack-name ForgeOmni-dev \
                --query "StackResources[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" \
                --output text 2>/dev/null || echo "")
              echo "Resources to retain: $RETAIN"
              
              if [ -n "$RETAIN" ]; then
                aws cloudformation delete-stack --stack-name ForgeOmni-dev --retain-resources $RETAIN
              else
                aws cloudformation delete-stack --stack-name ForgeOmni-dev
              fi
              
              echo "Waiting for final deletion..."
              aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev || true
              
              # Clean up retained ECS resources
              echo "Cleaning up retained resources..."
              aws ecs delete-cluster --cluster omni-dev 2>/dev/null && echo "Deleted retained cluster" || echo "No cluster to delete"
              echo "Stack deleted."
              exit 0
            fi
            
            echo "Unexpected status: $STATUS after delete attempt. Will try CDK anyway."
          fi
          
          echo "Stack in status: $STATUS. Proceeding with CDK deploy."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CDK dependencies
        run: npm ci

      - name: CDK Deploy
        run: |
          npx cdk deploy ForgeNetwork-dev ForgeOmni-dev \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            -c env=dev \
            -c deployOmni=true

      - name: Show stack outputs
        run: |
          echo "=== OMNI Deployment Outputs ==="
          cat cdk-outputs.json | python3 -m json.tool
