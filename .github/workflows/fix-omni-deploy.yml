name: Fix OMNI Deploy (delete failed stack + redeploy)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete failed ForgeOmni-dev stack
        run: |
          echo "Checking ForgeOmni-dev stack status..."
          STATUS=$(aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Current status: $STATUS"
          
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name ForgeOmni-dev
            echo "Waiting for deletion..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev
            echo "Stack deleted."
          elif [ "$STATUS" = "ROLLBACK_FAILED" ]; then
            echo "Stack in ROLLBACK_FAILED state — need to delete with retain of stuck resources..."
            # First, find resources that failed to delete
            RETAIN=$(aws cloudformation describe-stack-resources --stack-name ForgeOmni-dev \
              --query "StackResources[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" \
              --output text 2>/dev/null || echo "")
            echo "Resources to retain: $RETAIN"
            
            if [ -n "$RETAIN" ]; then
              # Convert space-separated to array for --retain-resources
              RETAIN_ARGS=""
              for r in $RETAIN; do
                RETAIN_ARGS="$RETAIN_ARGS $r"
              done
              echo "Deleting stack with --retain-resources $RETAIN_ARGS ..."
              aws cloudformation delete-stack --stack-name ForgeOmni-dev --retain-resources $RETAIN_ARGS
            else
              echo "No stuck resources found, attempting normal delete..."
              aws cloudformation delete-stack --stack-name ForgeOmni-dev
            fi
            
            echo "Waiting for deletion..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev --no-cli-pager || true
            
            # Clean up retained ECS resources manually
            echo "Cleaning up any retained ECS resources..."
            # Delete the ECS cluster if it was retained
            aws ecs delete-cluster --cluster omni-dev 2>/dev/null && echo "Deleted retained ECS cluster omni-dev" || echo "No retained cluster to delete"
            
            echo "Stack deleted."
          elif [ "$STATUS" = "DOES_NOT_EXIST" ]; then
            echo "Stack doesn't exist, proceeding with fresh deploy."
          elif [ "$STATUS" = "DELETE_IN_PROGRESS" ]; then
            echo "Stack deletion already in progress, waiting..."
            aws cloudformation wait stack-delete-complete --stack-name ForgeOmni-dev
            echo "Stack deleted."
          else
            echo "Stack in status: $STATUS — proceeding with CDK deploy."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CDK dependencies
        run: npm ci

      - name: CDK Deploy
        run: |
          npx cdk deploy ForgeNetwork-dev ForgeOmni-dev \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            -c env=dev \
            -c deployOmni=true

      - name: Show stack outputs
        run: |
          echo "=== OMNI Deployment Outputs ==="
          cat cdk-outputs.json | python3 -m json.tool
