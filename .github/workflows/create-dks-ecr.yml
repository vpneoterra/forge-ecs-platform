name: Create DKS ECR Repositories

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  create-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create dks-query ECR repository
        run: |
          aws ecr create-repository \
            --repository-name dks-query \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE \
            --tags Key=Project,Value=DKS Key=ManagedBy,Value=CDK Key=Owner,Value=vpneoterra \
            2>/dev/null || echo "Repository 'dks-query' may already exist"
          
          echo "ECR repository 'dks-query' ready:"
          aws ecr describe-repositories --repository-names dks-query --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' --output text

      - name: Create dks-ingest ECR repository
        run: |
          aws ecr create-repository \
            --repository-name dks-ingest \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE \
            --tags Key=Project,Value=DKS Key=ManagedBy,Value=CDK Key=Owner,Value=vpneoterra \
            2>/dev/null || echo "Repository 'dks-ingest' may already exist"
          
          echo "ECR repository 'dks-ingest' ready:"
          aws ecr describe-repositories --repository-names dks-ingest --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' --output text
