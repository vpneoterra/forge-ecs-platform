name: Deploy FORGE Platform

# CDK deploys are slow (10-30 min) — only trigger manually for infra changes.
# Application code deploys go through forgenew/deploy-test.yml (2-3 min).
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      skipRds:
        description: 'Skip RDS (use external Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      alertEmail:
        description: 'Alert email address'
        required: false
        default: 'ops@forge.local'

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  # ── Lint & Type-check ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile (no emit)
        run: npx tsc --noEmit

  # ── CDK Diff (PR only) ────────────────────────────────────────────────────
  diff:
    name: CDK diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: typecheck
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: CDK diff
        id: diff
        run: |
          DIFF_OUTPUT=$(npx cdk diff --all -c env=dev -c deployApp=true -c appDomain=forge.qrucible.ai -c skipRds=true 2>&1 || true)
          echo "$DIFF_OUTPUT"
          echo "diff_output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment diff on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CDK Diff\n\`\`\`\n${{ steps.diff.outputs.diff_output }}\n\`\`\``
            })

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'dev' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install dependencies
        run: npm ci

      - name: CDK Bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          npx cdk bootstrap aws://$ACCOUNT_ID/${{ env.AWS_REGION }} \
            --cloudformation-execution-policies 'arn:aws:iam::aws:policy/AdministratorAccess'

      - name: CDK Synth (validation)
        run: |
          npx cdk synth --all \
            -c env=${{ github.event.inputs.environment || 'dev' }} \
            -c deployApp=true \
            -c appDomain=forge.qrucible.ai \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail || 'ops@forge.local' }}

      - name: CDK Deploy
        run: |
          npx cdk deploy --all \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            -c env=${{ github.event.inputs.environment || 'dev' }} \
            -c deployApp=true \
            -c appDomain=forge.qrucible.ai \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail || 'ops@forge.local' }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-${{ github.event.inputs.environment || 'dev' }}
          path: cdk-outputs.json
          retention-days: 30

      - name: Show stack outputs
        run: |
          echo "=== Deployed Stack Outputs ==="
          cat cdk-outputs.json | python3 -m json.tool

      - name: Smoke test
        run: |
          # Wait for ECS services to stabilize
          CLUSTER="forge-app-dev"
          echo "Waiting for ECS services to become stable in cluster: $CLUSTER"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services forge-app-service omni-service \
            --region ${{ env.AWS_REGION }} || echo "Warning: services not stable yet (may still be starting)"
          echo "Smoke test complete"
