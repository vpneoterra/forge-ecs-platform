name: Deploy FORGE Platform

# CDK deploys are slow (10-30 min) — only trigger manually for infra changes.
# Application code deploys go through forgenew/deploy-test.yml (2-3 min).
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - dev2
          - prod
      skipRds:
        description: 'Skip RDS (use external Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      alertEmail:
        description: 'Alert email address'
        required: false
        default: 'ops@forge.local'
      deployDks:
        description: 'Deploy DKS (Design Knowledge System)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      deployGemma:
        description: 'Deploy Gemma GPU inference stack (g6.2xlarge + NLB)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      # NOTE: The three flags below are tri-state. Leave on 'auto' to use the
      # environment's known-correct stack set (see the Resolve deploy flags
      # step); pick 'true'/'false' only to override for a one-off deploy.
      #
      # dev2 (GREEN) is a FULL environment: ForgeGeometry-dev2, ForgeLucid-dev2
      # and the solver stacks (ForgeData/Compute/Orchestration-dev2) are all
      # live. Deploying dev2 with these false would DESTROY those stacks, so
      # 'auto' resolves them to true for dev2. dev/prod keep false on 'auto'.
      deployGeometry:
        description: 'Deploy Geometry Platform (B-Rep, GPU SDF, Neural SDF)'
        required: false
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'true'
          - 'false'
      deployLucid:
        description: 'Deploy LUCID multi-mode AI workspace'
        required: false
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'true'
          - 'false'
      deploySolvers:
        description: 'Deploy solver/compute stacks (ForgeData + ForgeCompute + ForgeOrchestration; includes SysML kernel)'
        required: false
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'true'
          - 'false'
      lucidActiveMode:
        description: 'LUCID active mode'
        required: false
        default: 'code'
        type: choice
        options:
          - code
          - dac
          - iac
      lucidImageTag:
        description: 'LUCID image tag (used when lucidImageDigest is empty). Default: latest'
        required: false
        default: 'latest'
        type: string
      lucidImageDigest:
        description: "LUCID image digest (preferred, e.g. 'sha256:abc...'). Leave blank to pin by tag instead."
        required: false
        default: ''
        type: string
      # ── forge-omni image pin ────────────────────────────────────────────
      # The forge-omni render service (ForgeApp-<env> uses ctxPrefix 'forgeOmni';
      # the standalone ForgeOmni stack uses ctxPrefix 'omni') is resolved via
      # resolveEcrImage with requireImmutable=true, so synth FAILS unless an
      # immutable digest/tag is pinned here (RC2-A/RC2-C, program 253f20a6 — never
      # ':latest'). The OMNI build pipeline (build-omni-standalone.yml) pushes an
      # immutable build image to the 'forge-omni' ECR repo and prints its
      # '@sha256:<digest>'; pass that digest here to roll OMNI onto this deploy.
      forgeOmniImageDigest:
        description: "forge-omni image digest to pin (e.g. 'sha256:abc...'). REQUIRED to deploy the OMNI render service. Leave blank only to pin by tag instead."
        required: false
        default: ''
        type: string
      forgeOmniImageTag:
        description: "forge-omni immutable build tag (used only when forgeOmniImageDigest is empty; e.g. a build-SHA/timestamp tag). NEVER 'latest'."
        required: false
        default: ''
        type: string

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  # ── Lint & Type-check ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile (no emit)
        run: npx tsc --noEmit

  # ── CDK Diff (PR only) ────────────────────────────────────────────────────
  diff:
    name: CDK diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: typecheck
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: CDK diff
        id: diff
        run: |
          DIFF_OUTPUT=$(npx cdk diff --all -c env=dev -c deployApp=true -c deployDks=true -c deployGemma=false -c deployGeometry=false -c appDomain=forge.qrucible.ai -c skipRds=true 2>&1 || true)
          echo "$DIFF_OUTPUT"
          echo "diff_output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment diff on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CDK Diff\n\`\`\`\n${{ steps.diff.outputs.diff_output }}\n\`\`\``
            })

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'dev' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # Resolve the per-stack deploy flags from the selected environment.
      # 'auto' means "use this environment's known-correct stack set":
      #   - dev2 (GREEN) is a full env  -> Geometry/Lucid/Solvers = true
      #   - dev / prod                  -> Geometry/Lucid/Solvers = false
      # An explicit 'true'/'false' input always overrides the auto value.
      - name: Resolve deploy flags
        id: flags
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          IN_GEOMETRY: ${{ github.event.inputs.deployGeometry || 'auto' }}
          IN_LUCID: ${{ github.event.inputs.deployLucid || 'auto' }}
          IN_SOLVERS: ${{ github.event.inputs.deploySolvers || 'auto' }}
        run: |
          set -euo pipefail
          # Default (auto) values per environment.
          case "$ENVIRONMENT" in
            dev2)
              auto_geometry=true; auto_lucid=true; auto_solvers=true ;;
            *)
              auto_geometry=false; auto_lucid=false; auto_solvers=false ;;
          esac
          resolve() { if [ "$1" = "auto" ]; then echo "$2"; else echo "$1"; fi; }
          GEOMETRY=$(resolve "$IN_GEOMETRY" "$auto_geometry")
          LUCID=$(resolve "$IN_LUCID" "$auto_lucid")
          SOLVERS=$(resolve "$IN_SOLVERS" "$auto_solvers")
          echo "deployGeometry=$GEOMETRY" >> "$GITHUB_OUTPUT"
          echo "deployLucid=$LUCID" >> "$GITHUB_OUTPUT"
          echo "deploySolvers=$SOLVERS" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy flags for env=$ENVIRONMENT:"
          echo "  deployGeometry=$GEOMETRY  deployLucid=$LUCID  deploySolvers=$SOLVERS"

      - name: Install dependencies
        run: npm ci

      - name: CDK Bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          npx cdk bootstrap aws://$ACCOUNT_ID/${{ env.AWS_REGION }} \
            --cloudformation-execution-policies 'arn:aws:iam::aws:policy/AdministratorAccess'

      - name: CDK Synth (validation)
        run: |
          npx cdk synth --all \
            -c env=${{ github.event.inputs.environment || 'dev' }} \
            -c deployApp=true \
            -c deployDks=${{ github.event.inputs.deployDks || 'true' }} \
            -c deployGemma=${{ github.event.inputs.deployGemma || 'false' }} \
            -c deployGeometry=${{ steps.flags.outputs.deployGeometry }} \
            -c deployLucid=${{ steps.flags.outputs.deployLucid }} \
            -c deploySolvers=${{ steps.flags.outputs.deploySolvers }} \
            -c lucidActiveMode=${{ github.event.inputs.lucidActiveMode || 'code' }} \
            -c lucidImageTag=${{ github.event.inputs.lucidImageTag || 'latest' }} \
            -c lucidImageDigest=${{ github.event.inputs.lucidImageDigest || '' }} \
            -c forgeOmniImageDigest=${{ github.event.inputs.forgeOmniImageDigest || '' }} \
            -c forgeOmniImageTag=${{ github.event.inputs.forgeOmniImageTag || '' }} \
            -c omniImageDigest=${{ github.event.inputs.forgeOmniImageDigest || '' }} \
            -c omniImageTag=${{ github.event.inputs.forgeOmniImageTag || '' }} \
            -c appDomain=forge.qrucible.ai \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail || 'ops@forge.local' }}

      - name: CDK Deploy
        run: |
          npx cdk deploy --all \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            -c env=${{ github.event.inputs.environment || 'dev' }} \
            -c deployApp=true \
            -c deployDks=${{ github.event.inputs.deployDks || 'true' }} \
            -c deployGemma=${{ github.event.inputs.deployGemma || 'false' }} \
            -c deployGeometry=${{ steps.flags.outputs.deployGeometry }} \
            -c deployLucid=${{ steps.flags.outputs.deployLucid }} \
            -c deploySolvers=${{ steps.flags.outputs.deploySolvers }} \
            -c lucidActiveMode=${{ github.event.inputs.lucidActiveMode || 'code' }} \
            -c lucidImageTag=${{ github.event.inputs.lucidImageTag || 'latest' }} \
            -c lucidImageDigest=${{ github.event.inputs.lucidImageDigest || '' }} \
            -c forgeOmniImageDigest=${{ github.event.inputs.forgeOmniImageDigest || '' }} \
            -c forgeOmniImageTag=${{ github.event.inputs.forgeOmniImageTag || '' }} \
            -c omniImageDigest=${{ github.event.inputs.forgeOmniImageDigest || '' }} \
            -c omniImageTag=${{ github.event.inputs.forgeOmniImageTag || '' }} \
            -c appDomain=forge.qrucible.ai \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail || 'ops@forge.local' }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-${{ github.event.inputs.environment || 'dev' }}
          path: cdk-outputs.json
          retention-days: 30

      - name: Show stack outputs
        run: |
          echo "=== Deployed Stack Outputs ==="
          cat cdk-outputs.json | python3 -m json.tool

      - name: Smoke test
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          set -euo pipefail
          # Cluster + service names are env-scoped in the app stack
          # (clusterName: forge-app-<env>; appServiceName: forge-app-<env>,
          # except the legacy 'dev' env which keeps forge-app-test; omni is
          # always forge-omni).
          CLUSTER="forge-app-${ENVIRONMENT}"
          if [ "$ENVIRONMENT" = "dev" ]; then
            APP_SERVICE="forge-app-test"
          else
            APP_SERVICE="forge-app-${ENVIRONMENT}"
          fi
          OMNI_SERVICE="forge-omni"
          echo "Waiting for ECS services to become stable in cluster: $CLUSTER"
          echo "  services: $APP_SERVICE $OMNI_SERVICE"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$APP_SERVICE" "$OMNI_SERVICE" \
            --region ${{ env.AWS_REGION }} || echo "Warning: services not stable yet (may still be starting)"
          echo "Smoke test complete"
