name: "ABC: Debug — list dks-download task defs"

# One-off helper. Lists the most recent dks-download task definition
# revisions and their container image, so we can see what the rollback
# left us with after a partial deploy failure.

on:
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: List task def revisions + images
        run: |
          set -euo pipefail
          aws ecs list-task-definitions --family-prefix dks-download \
            --sort DESC --max-items 10 \
            --query 'taskDefinitionArns' --output text | tr '\t' '\n' \
          | while read -r ARN; do
              [ -z "$ARN" ] && continue
              IMG=$(aws ecs describe-task-definition --task-definition "$ARN" \
                --query 'taskDefinition.containerDefinitions[0].image' --output text)
              echo "$ARN  image=$IMG"
            done
