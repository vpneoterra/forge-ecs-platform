name: Check OMNI Status

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check CloudFormation stack
        run: |
          echo "=== CloudFormation Stack Status ==="
          aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
            --query 'Stacks[0].{Status:StackStatus,Reason:StackStatusReason}' \
            --output table 2>/dev/null || echo "Stack does not exist"

      - name: Check ECS cluster and service
        run: |
          echo "=== ECS Service Status ==="
          aws ecs describe-services --cluster omni-dev --services omni-dev \
            --query 'services[0].{Status:status,Desired:desiredCount,Running:runningCount,Pending:pendingCount}' \
            --output json 2>/dev/null || echo "Service not found"
          
          echo ""
          echo "=== ECS Service Events (latest 5) ==="
          aws ecs describe-services --cluster omni-dev --services omni-dev \
            --query 'services[0].events[0:5].message' \
            --output text 2>/dev/null || echo "No events"

      - name: Check ECS tasks
        run: |
          set +e
          echo "=== Running Tasks ==="
          TASKS=$(aws ecs list-tasks --cluster omni-dev --service-name omni-dev --query 'taskArns' --output json 2>/dev/null)
          echo "Running task arns: $TASKS"
          
          echo ""
          echo "=== Stopped Tasks ==="
          STOPPED=$(aws ecs list-tasks --cluster omni-dev --service-name omni-dev --desired-status STOPPED --query 'taskArns[]' --output text 2>/dev/null)
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            for TASK in $STOPPED; do
              echo "--- Task: $TASK ---"
              aws ecs describe-tasks --cluster omni-dev --tasks "$TASK" \
                --query 'tasks[0].{Status:lastStatus,StopCode:stopCode,StopReason:stoppedReason,ContainerStatus:containers[0].{Status:lastStatus,Reason:reason,ExitCode:exitCode}}' \
                --output json 2>/dev/null
              echo ""
            done
          else
            echo "No stopped tasks"
          fi

      - name: Check CloudWatch Logs
        run: |
          set +e
          echo "=== Log Streams ==="
          aws logs describe-log-streams \
            --log-group-name /forge/ecs/omni \
            --order-by LastEventTime \
            --descending \
            --limit 3 \
            --output json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for s in data.get('logStreams', []):
            print(f'Stream: {s[\"logStreamName\"]}')
          " 2>/dev/null || echo "No log streams"
          
          echo ""
          echo "=== Recent Logs ==="
          STREAM=$(aws logs describe-log-streams \
            --log-group-name /forge/ecs/omni \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)
          
          if [ -n "$STREAM" ] && [ "$STREAM" != "None" ]; then
            echo "Reading from stream: $STREAM"
            aws logs get-log-events \
              --log-group-name /forge/ecs/omni \
              --log-stream-name "$STREAM" \
              --limit 100 \
              --query 'events[*].message' \
              --output json 2>/dev/null | python3 -c "
          import sys, json
          msgs = json.load(sys.stdin)
          for m in msgs:
            print(m)
          " 2>/dev/null || echo "Could not read logs"
          else
            echo "No log streams available"
          fi
