name: Check OMNI Status

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check CloudFormation stack
        run: |
          echo "=== CloudFormation Stack Status ==="
          aws cloudformation describe-stacks --stack-name ForgeOmni-dev \
            --query 'Stacks[0].{Status:StackStatus,Reason:StackStatusReason}' \
            --output table 2>/dev/null || echo "Stack does not exist"

      - name: Check ECS cluster and service
        run: |
          echo "=== ECS Service Status ==="
          aws ecs describe-services --cluster omni-dev --services omni-dev \
            --query 'services[0].{Status:status,Desired:desiredCount,Running:runningCount,Pending:pendingCount,Events:events[0:5]}' \
            --output json 2>/dev/null || echo "Service not found"

      - name: Check ECS tasks
        run: |
          echo "=== Running Tasks ==="
          TASKS=$(aws ecs list-tasks --cluster omni-dev --service-name omni-dev --query 'taskArns' --output text 2>/dev/null)
          if [ -n "$TASKS" ] && [ "$TASKS" != "None" ]; then
            aws ecs describe-tasks --cluster omni-dev --tasks $TASKS \
              --query 'tasks[*].{TaskId:taskArn,Status:lastStatus,StopCode:stopCode,StopReason:stoppedReason,Health:healthStatus}' \
              --output table
          else
            echo "No running tasks found"
          fi

          echo ""
          echo "=== Recently Stopped Tasks ==="
          STOPPED=$(aws ecs list-tasks --cluster omni-dev --service-name omni-dev --desired-status STOPPED --query 'taskArns' --output text 2>/dev/null)
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            aws ecs describe-tasks --cluster omni-dev --tasks $STOPPED \
              --query 'tasks[*].{TaskId:taskArn,Status:lastStatus,StopCode:stopCode,StopReason:stoppedReason}' \
              --output table
          else
            echo "No stopped tasks"
          fi

      - name: Check CloudWatch Logs
        run: |
          echo "=== Recent Container Logs (last 50 lines) ==="
          LOG_STREAMS=$(aws logs describe-log-streams \
            --log-group-name /forge/ecs/omni \
            --order-by LastEventTime \
            --descending \
            --limit 3 \
            --query 'logStreams[*].logStreamName' \
            --output text 2>/dev/null)
          
          if [ -n "$LOG_STREAMS" ]; then
            for STREAM in $LOG_STREAMS; do
              echo "--- Stream: $STREAM ---"
              aws logs get-log-events \
                --log-group-name /forge/ecs/omni \
                --log-stream-name "$STREAM" \
                --limit 50 \
                --query 'events[*].message' \
                --output text 2>/dev/null | tail -50
              echo ""
            done
          else
            echo "No log streams found"
          fi

      - name: Check ALB health
        run: |
          echo "=== ALB Target Health ==="
          TG_ARN=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?contains(TargetGroupName, 'ForgeO') || contains(TargetGroupName, 'Omni')].TargetGroupArn" \
            --output text 2>/dev/null)
          if [ -n "$TG_ARN" ]; then
            aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --output table 2>/dev/null
          else
            echo "Target group not found"
          fi
