name: Deploy Testing Harness (Tier-2)

# Deploys the ForgeTestingHarness-<env> stack (auto-pause Lambda enabled by
# default), builds/pushes the runner image to ECR, runs a small 1-3 chip
# smoke test via ECS run-task, then pauses the harness service and stops
# any lingering tasks -- even if an earlier step fails.
#
# Runtime cost is capped by the harness stack's USD 50 budget + auto-pause.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      smoke_count:
        description: 'Number of shape chips to run in the smoke test (1-3)'
        required: false
        default: '3'
        type: string
      image_tag:
        description: 'Extra ECR tag to apply to the harness image (default: github.sha)'
        required: false
        default: ''
        type: string
      alertEmail:
        description: 'Email for harness budget / CloudWatch alerts'
        required: false
        default: 'notifications@neoterra.partners'
        type: string

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  deploy-and-smoke:
    name: Deploy + smoke tier-2 harness (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: testing-harness-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install dependencies
        run: npm ci

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${GITHUB_SHA::12}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved harness image tag: ${TAG}"

      - name: CDK Synth (harness + omni)
        run: |
          npx cdk synth \
            ForgeNetwork-${{ github.event.inputs.environment }} \
            ForgeOmni-${{ github.event.inputs.environment }} \
            ForgeTestingHarness-${{ github.event.inputs.environment }} \
            -c env=${{ github.event.inputs.environment }} \
            -c deployTestingHarness=true \
            -c deployOmni=true \
            -c deploySolvers=true \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail }}

      - name: CDK Deploy (harness stack and dependencies)
        run: |
          npx cdk deploy \
            ForgeNetwork-${{ github.event.inputs.environment }} \
            ForgeOmni-${{ github.event.inputs.environment }} \
            ForgeTestingHarness-${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file harness-cdk-outputs.json \
            -c env=${{ github.event.inputs.environment }} \
            -c deployTestingHarness=true \
            -c deployOmni=true \
            -c deploySolvers=true \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: harness-cdk-outputs-${{ github.event.inputs.environment }}
          path: harness-cdk-outputs.json
          retention-days: 30

      - name: Build and push harness image
        run: |
          ./scripts/harness-build.sh \
            ${{ github.event.inputs.environment }} \
            ${{ steps.tag.outputs.image_tag }}

      - name: Run 1-3 chip smoke test
        env:
          SMOKE_COUNT: ${{ github.event.inputs.smoke_count }}
          WAIT_FOR_COMPLETION: 'true'
        run: |
          if ! [[ "${SMOKE_COUNT}" =~ ^[1-3]$ ]]; then
            echo "smoke_count must be 1, 2, or 3 (got: ${SMOKE_COUNT})"
            exit 1
          fi
          ./scripts/harness-run.sh ${{ github.event.inputs.environment }}

      - name: Pause harness (always, even on failure)
        if: always()
        run: |
          ./scripts/harness-pause.sh ${{ github.event.inputs.environment }}
