name: Deploy Testing Harness (Tier-2)

# Deploys the ForgeTestingHarness-<env> stack (auto-pause Lambda enabled by
# default), builds/pushes the runner image to ECR, runs a small 1-3 chip
# smoke test via ECS run-task, then pauses the harness service and stops
# any lingering tasks -- even if an earlier step fails.
#
# Runtime cost is capped by the harness stack's USD 50 budget + auto-pause.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      smoke_count:
        description: 'Number of shape chips to run in the smoke test (1-3)'
        required: false
        default: '3'
        type: string
      image_tag:
        description: 'Extra ECR tag to apply to the harness image (default: github.sha)'
        required: false
        default: ''
        type: string
      alertEmail:
        description: 'Email for harness budget / CloudWatch alerts'
        required: false
        default: 'notifications@neoterra.partners'
        type: string

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  deploy-and-smoke:
    name: Deploy + smoke tier-2 harness (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: testing-harness-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      # Private -- uses the same GH_PAT pattern as build-images.yml /
      # build-geometry-images.yml. The checkout happens on the GitHub
      # Actions runner only; the token never lands in the Docker image
      # or the ECS task environment. The runner image bakes in the
      # resulting server/axiom/chips/shapes/ subtree (313 JSON chips)
      # so the ECS task can read it from /corpus/shapes with no
      # GitHub credentials at runtime.
      - name: Checkout vpneoterra/forgenew (shape-chip corpus source)
        uses: actions/checkout@v4
        with:
          repository: vpneoterra/forgenew
          token: ${{ secrets.GH_PAT }}
          ref: main
          path: forgenew-src

      - name: Verify forgenew corpus checkout
        run: |
          CORPUS="${GITHUB_WORKSPACE}/forgenew-src/server/axiom/chips/shapes"
          if [ ! -d "${CORPUS}" ]; then
            echo "::error::corpus subpath not found: ${CORPUS}"
            exit 1
          fi
          COUNT=$(find "${CORPUS}" -type f -name '*.json' | wc -l | tr -d ' ')
          echo "Discovered ${COUNT} shape-chip JSON files under ${CORPUS}"
          if [ "${COUNT}" -ne 313 ]; then
            echo "::warning::expected 313 shape-chip JSONs, found ${COUNT}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install dependencies
        run: npm ci

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${GITHUB_SHA::12}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved harness image tag: ${TAG}"

      # Preflight: if a prior ForgeOmni-<env> deploy left the stack in
      # ROLLBACK_FAILED / *_FAILED (e.g. because the Route 53 A record
      # omni.qrucible.ai already existed out-of-band), the CFN console is
      # stuck and any stack operation in the same account can be blocked.
      # We do NOT redeploy OMNI here and we must NOT delete the existing
      # Route 53 record or ALB. Retain every stuck resource and let CFN
      # remove only the stack metadata.
      - name: Preflight ForgeOmni-${{ github.event.inputs.environment }} (only if stuck)
        run: |
          set +e
          STACK="ForgeOmni-${{ github.event.inputs.environment }}"
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Current status of $STACK: $STATUS"

          if [ "$STATUS" = "DOES_NOT_EXIST" ]; then
            echo "No ForgeOmni stack in the account -- nothing to preflight."
            exit 0
          fi

          case "$STATUS" in
            *ROLLBACK_FAILED*|*DELETE_FAILED*|*CREATE_FAILED*|*UPDATE_ROLLBACK_FAILED*)
              echo "Stack in stuck state ($STATUS). Retaining ALL resources to"
              echo "avoid deleting the live Route 53 record / ALB / ECS cluster."
              ALL_RESOURCES=$(aws cloudformation describe-stack-resources --stack-name "$STACK" \
                --query "StackResources[*].LogicalResourceId" --output text 2>/dev/null || echo "")
              if [ -z "$ALL_RESOURCES" ]; then
                echo "Could not list resources -- skipping preflight without action."
                exit 0
              fi
              echo "Retain list: $ALL_RESOURCES"
              aws cloudformation delete-stack --stack-name "$STACK" --retain-resources $ALL_RESOURCES
              echo "Waiting up to 5 min for CFN to drop the stuck stack..."
              timeout 300 aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
              FINAL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
                --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
              echo "Final status: $FINAL"
              ;;
            *)
              echo "Stack healthy or transitioning ($STATUS) -- leaving it alone."
              ;;
          esac
          exit 0

      # Harness only needs the OMNI ALB hostname (passed via -c omniDomain).
      # We deliberately do NOT list ForgeOmni-<env> here: the harness stack
      # does not cross-import OMNI constructs, and redeploying ForgeOmni
      # against an existing `omni.qrucible.ai` A record triggers the
      # "record set already exists" failure.
      #
      # We also do NOT redeploy ForgeNetwork-<env>: the harness cross-imports
      # VPC / subnets / SGs from the already-running network stack via CFN
      # exports. Re-synthing network without the other consumer stacks
      # (ForgeApp, ForgeOmni) in the app would prune exports those stacks
      # still import, which CloudFormation rejects (e.g. "Cannot delete
      # export ForgeNetwork-dev:ExportsOutputRefForgeVpcIGW...").
      # --exclusively pins the deploy to ForgeTestingHarness-<env> only, so
      # the live ForgeNetwork-<env> exports are read as-is and never mutated.
      # Synth still includes ForgeNetwork-<env> so CDK can resolve the
      # VPC/subnet/SG references at synth time, but the command line only
      # targets the harness stack for deployment.
      - name: CDK Synth (harness, with network for ref resolution)
        run: |
          npx cdk synth \
            ForgeNetwork-${{ github.event.inputs.environment }} \
            ForgeTestingHarness-${{ github.event.inputs.environment }} \
            -c env=${{ github.event.inputs.environment }} \
            -c deployTestingHarness=true \
            -c deploySolvers=true \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail }}

      - name: CDK Deploy (harness only -- do NOT touch ForgeNetwork)
        run: |
          npx cdk deploy \
            ForgeTestingHarness-${{ github.event.inputs.environment }} \
            --exclusively \
            --require-approval never \
            --outputs-file harness-cdk-outputs.json \
            -c env=${{ github.event.inputs.environment }} \
            -c deployTestingHarness=true \
            -c deploySolvers=true \
            -c skipRds=true \
            -c alertEmail=${{ github.event.inputs.alertEmail }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: harness-cdk-outputs-${{ github.event.inputs.environment }}
          path: harness-cdk-outputs.json
          retention-days: 30

      - name: Build and push harness image
        env:
          # harness-build.sh stages this subtree into the Docker build
          # context so the corpus is baked into the image. The ECS task
          # never needs GitHub credentials.
          FORGENEW_DIR: ${{ github.workspace }}/forgenew-src
          FORGENEW_SUBPATH: server/axiom/chips/shapes
        run: |
          ./scripts/harness-build.sh \
            ${{ github.event.inputs.environment }} \
            ${{ steps.tag.outputs.image_tag }}

      - name: Run 1-3 chip smoke test
        env:
          SMOKE_COUNT: ${{ github.event.inputs.smoke_count }}
          WAIT_FOR_COMPLETION: 'true'
        run: |
          if ! [[ "${SMOKE_COUNT}" =~ ^[1-3]$ ]]; then
            echo "smoke_count must be 1, 2, or 3 (got: ${SMOKE_COUNT})"
            exit 1
          fi
          ./scripts/harness-run.sh ${{ github.event.inputs.environment }}

      - name: Pause harness (always, even on failure)
        if: always()
        run: |
          ./scripts/harness-pause.sh ${{ github.event.inputs.environment }}
