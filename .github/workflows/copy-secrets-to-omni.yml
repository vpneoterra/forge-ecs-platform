name: Copy Secrets to OMNI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copy-secrets:
    name: Copy AWS secrets to OMNI repo
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets to OMNI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Set AWS_ACCESS_KEY_ID
          echo "$AWS_KEY" | gh secret set AWS_ACCESS_KEY_ID --repo vpneoterra/OMNI
          echo "✓ AWS_ACCESS_KEY_ID set"
          
          # Set AWS_SECRET_ACCESS_KEY
          echo "$AWS_SECRET" | gh secret set AWS_SECRET_ACCESS_KEY --repo vpneoterra/OMNI
          echo "✓ AWS_SECRET_ACCESS_KEY set"
          
          # Set GH_PAT (using the token that has cross-repo access)
          echo "$GH_TOKEN" | gh secret set GH_PAT --repo vpneoterra/OMNI
          echo "✓ GH_PAT set"
          
          echo "All secrets copied to vpneoterra/OMNI"
