name: Build LLM Cluster Images

# Builds the 3 llmcluster model-serving images and pushes them to ECR:
#   - llmcluster-devstral (vLLM, AWQ)         -> independent
#   - llmcluster-llamacpp (CUDA base)         -> built first
#   - llmcluster-gemma  (FROM llamacpp base)  -> built after base
#   - llmcluster-qwen   (FROM llamacpp base)  -> built after base
#
# Mirrors build-images.yml conventions: workflow_dispatch, AWS access-key
# secrets, amazon-ecr-login@v2, buildx, latest+date+sha tags, registry cache.

on:
  workflow_dispatch:
    inputs:
      target_image:
        description: 'Specific image to build (devstral|llamacpp|gemma|qwen). Empty = all.'
        required: false
        default: ''

env:
  AWS_REGION: us-east-1

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: base + independent images. The llama.cpp CUDA base must exist in
  # ECR before gemma/qwen (which FROM it) can build.
  # ---------------------------------------------------------------------------
  build-base:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: llmcluster-llamacpp
            dockerfile: Dockerfile.llamacpp
            platforms: linux/amd64
          - name: llmcluster-devstral
            dockerfile: Dockerfile.devstral
            platforms: linux/amd64
    steps:
      - name: Check if this image should build
        id: filter
        run: |
          TARGET="${{ github.event.inputs.target_image }}"
          SHOULD=true
          # gemma/qwen depend on llamacpp -> if building only those, still build the base.
          if [ -n "$TARGET" ]; then
            case "$TARGET" in
              llamacpp|devstral)
                [ "$TARGET" != "${{ matrix.image.name }}" ] && [ "llmcluster-$TARGET" != "${{ matrix.image.name }}" ] && SHOULD=false ;;
              gemma|qwen)
                # only the base is needed from this stage
                [ "${{ matrix.image.name }}" != "llmcluster-llamacpp" ] && SHOULD=false ;;
            esac
          fi
          echo "should_build=$SHOULD" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.filter.outputs.should_build == 'true'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: steps.filter.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.should_build == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        if: steps.filter.outputs.should_build == 'true'
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.image.name }} --region ${{ env.AWS_REGION }} \
            || aws ecr create-repository --repository-name ${{ matrix.image.name }} \
                 --image-scanning-configuration scanOnPush=true --region ${{ env.AWS_REGION }}

      - name: Set image metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.image.name }}
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/llmcluster
          file: ./docker/llmcluster/${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:latest
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.git_sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}

  # ---------------------------------------------------------------------------
  # Stage 2: model images that FROM the llama.cpp base (needs Stage 1 done).
  # ---------------------------------------------------------------------------
  build-models:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: llmcluster-gemma
            dockerfile: Dockerfile.gemma
            platforms: linux/amd64
          - name: llmcluster-qwen
            dockerfile: Dockerfile.qwen
            platforms: linux/amd64
    steps:
      - name: Check if this image should build
        id: filter
        run: |
          TARGET="${{ github.event.inputs.target_image }}"
          SHOULD=true
          if [ -n "$TARGET" ] && [ "$TARGET" != "${{ matrix.image.name }}" ] && [ "llmcluster-$TARGET" != "${{ matrix.image.name }}" ]; then
            SHOULD=false
          fi
          echo "should_build=$SHOULD" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.filter.outputs.should_build == 'true'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: steps.filter.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.should_build == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        if: steps.filter.outputs.should_build == 'true'
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.image.name }} --region ${{ env.AWS_REGION }} \
            || aws ecr create-repository --repository-name ${{ matrix.image.name }} \
                 --image-scanning-configuration scanOnPush=true --region ${{ env.AWS_REGION }}

      - name: Set image metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.image.name }}
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # gemma/qwen Dockerfiles FROM the llamacpp base by its :latest tag.
      - name: Build and push
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/llmcluster
          file: ./docker/llmcluster/${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:latest
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.git_sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache,mode=max

  notify:
    name: Notify build complete
    runs-on: ubuntu-latest
    needs: [build-base, build-models]
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## LLM Cluster Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| base (llamacpp + devstral) | ${{ needs.build-base.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| models (gemma + qwen) | ${{ needs.build-models.result }} |" >> $GITHUB_STEP_SUMMARY
