name: DKS — Tail Harvest Log
on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "ECS task ID"
        required: true
jobs:
  tail:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: |
          TID=${{ inputs.task_id }}
          STREAM="dks-ingest/dks-ingest/$TID"
          echo "=== Stream: $STREAM ==="
          aws logs get-log-events --log-group-name /forge/ecs/dks-ingest \
            --log-stream-name "$STREAM" --region us-east-1 \
            --limit 80 --query 'events[].message' --output text
