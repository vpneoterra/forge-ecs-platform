# ================================================================
# patch-dks-ingest-td.yml — Patch dks-ingest task definition in place
#
# ForgeApp-dev CFN is in a broken state (pre-existing secret drift),
# so cdk deploy is unavailable. This workflow does the minimal change
# needed for Phase 1: add Vertex env vars + GEMMA_VERTEX_SA_KEY_JSON
# secret to the dks-ingest task definition by registering a new
# revision via the AWS ECS API directly.
#
# Idempotent: re-running produces the same revision contents.
# Safe: dks-ingest is launched via run-task only (no long-running
# service), so new revisions take effect on next task launch.
# ================================================================
name: "DKS: Patch dks-ingest Task Def"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to pin (default: latest)"
        required: false
        default: "latest"
      dks_concurrency:
        description: "DKS_CONCURRENCY env (intra-source doc parallelism; 1 = serial, 4 = Vertex min-replicas=4). Empty string = leave existing value untouched."
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "266087050444"

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Vertex SA secret ARN
        id: vertex
        run: |
          ARN=$(aws secretsmanager describe-secret \
            --secret-id forge/test/vertex-sa-json \
            --query ARN --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT
          echo "Vertex SA secret ARN: $ARN"

      - name: Resolve DKS DATABASE_URL secret ARN
        id: dburl
        run: |
          ARN=$(aws secretsmanager describe-secret \
            --secret-id forge/test/dks-database-url \
            --query ARN --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Pull current dks-ingest task definition
        id: current
        run: |
          aws ecs describe-task-definition \
            --task-definition dks-ingest \
            --query 'taskDefinition' > /tmp/current_td.json
          echo "Current revision:"
          jq '.revision' /tmp/current_td.json
          jq '.containerDefinitions[0] | {image, environment, secrets}' /tmp/current_td.json

      - name: Build patched task definition
        id: build
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          DKS_CONCURRENCY: ${{ github.event.inputs.dks_concurrency }}
          VERTEX_SA_ARN: ${{ steps.vertex.outputs.arn }}
          DBURL_ARN: ${{ steps.dburl.outputs.arn }}
          ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          python3 <<'PYEOF'
          import json, os

          with open('/tmp/current_td.json') as f:
              td = json.load(f)

          # Strip server-owned fields before re-registering
          for k in ('taskDefinitionArn', 'revision', 'status',
                    'registeredAt', 'registeredBy', 'requiresAttributes',
                    'compatibilities'):
              td.pop(k, None)

          cd = td['containerDefinitions'][0]

          # Image pinned to latest (or user-supplied)
          cd['image'] = f"{os.environ['ACCOUNT_ID']}.dkr.ecr.{os.environ['AWS_REGION']}.amazonaws.com/dks-ingest:{os.environ['IMAGE_TAG']}"

          # Full Vertex env set (desired state, not delta).
          #
          # MIGRATION (2026-04-22): moved from dedicated-endpoint (predict
          # mode) to Vertex AI Model-as-a-Service (MaaS / global region).
          # The previous dedicated endpoint
          #   mg-endpoint-8f11b5ef-4cd2-414e-a238-0f3b4904d17f.us-central1-141501991950.prediction.vertexai.goog
          # was deleted upstream. Earlier c=4 / c=8 smokes were passing off
          # stale DNS cache; c=12 smoke (run 24809955204) failed the DNS
          # preflight, exposing the issue.
          #
          # MaaS target (user-confirmed):
          #   URL:   https://aiplatform.googleapis.com/v1/projects/mindful-vial-493123-a5/locations/global/endpoints/openapi/chat/completions
          #   Model: google/gemma-4-26b-a4b-it-maas  (Gemma 4 26B A4B IT)
          #   Auth:  existing GEMMA_VERTEX_SA_KEY_JSON service account
          #
          # In MaaS mode, forgenew's vertex_backend._build_endpoint_url()
          # short-circuits on api_mode==maas and needs ONLY
          # GEMMA_VERTEX_PROJECT. ENDPOINT_ID / PROJECT_NUMBER / REGION are
          # ignored (left in env for diagnostic back-compat; harmless).
          # GEMMA_VERTEX_DEDICATED_DNS=false disables the preflight DNS probe
          # in run-dks-phase.yml so runs no longer block on the dead host.
          # GEMMA_VERTEX_SUPPRESS_PROMPT_ECHO is left "false" for back-compat;
          # MaaS chat/completions returns only the assistant message, so the
          # prompt-echo concern doesn't apply.
          vertex_env = {
              'LLM_BACKEND':                         'vertex',
              'GEMMA_VERTEX_PROJECT':                'mindful-vial-493123-a5',
              'GEMMA_VERTEX_PROJECT_NUMBER':         '141501991950',
              'GEMMA_VERTEX_REGION':                 'global',
              'GEMMA_VERTEX_ENDPOINT_ID':            'mg-endpoint-8f11b5ef-4cd2-414e-a238-0f3b4904d17f',
              'GEMMA_VERTEX_MODEL':                  'google/gemma-4-26b-a4b-it-maas',
              'GEMMA_VERTEX_API_MODE':               'maas',
              'DKS_EMBEDDING_MODEL':                 'all-MiniLM-L6-v2',
              'GEMMA_VERTEX_DEDICATED_DNS':          'false',
              'GEMMA_VERTEX_DEDICATED_DNS_PREFIX':   'mg-endpoint-8f11b5ef-4cd2-414e-a238-0f3b4904d17f',
              'GEMMA_VERTEX_SUPPRESS_PROMPT_ECHO':   'false',
          }

          existing = {e['name']: e['value'] for e in cd.get('environment', [])}
          existing.update(vertex_env)

          # Optional DKS_CONCURRENCY override. Empty input = keep whatever
          # was already in the task definition (no-op for back-compat).
          # Non-empty input writes the value as-is; the harvester's
          # _resolve_concurrency() clamps to [1, _CONCURRENCY_MAX] at runtime.
          dks_conc = os.environ.get('DKS_CONCURRENCY', '').strip()
          if dks_conc:
              existing['DKS_CONCURRENCY'] = dks_conc

          cd['environment'] = [{'name': k, 'value': v} for k, v in sorted(existing.items())]

          # Secrets (desired state). valueFrom must be a SecretsManager or SSM ARN.
          desired_secrets = {
              'DATABASE_URL':              os.environ['DBURL_ARN'],
              'GEMMA_VERTEX_SA_KEY_JSON':  os.environ['VERTEX_SA_ARN'],
          }
          existing_secrets = {s['name']: s['valueFrom'] for s in cd.get('secrets', [])}
          existing_secrets.update(desired_secrets)
          cd['secrets'] = [{'name': k, 'valueFrom': v} for k, v in sorted(existing_secrets.items())]

          # Override image ENTRYPOINT (python3) with bash -c so that
          # ECS containerOverrides.command = [script] runs as bash -c script.
          # This lets run-dks-phase pass an arbitrary shell script per phase.
          cd['entryPoint'] = ['/bin/bash', '-c']
          cd['command'] = ['echo "no phase command provided"; exit 1']

          with open('/tmp/new_td.json', 'w') as f:
              json.dump(td, f, indent=2)

          print("Patched container env:")
          print(json.dumps([e['name'] for e in cd['environment']], indent=2))
          print("Patched container secrets:")
          print(json.dumps([s['name'] for s in cd['secrets']], indent=2))
          print("Image:", cd['image'])
          PYEOF

      - name: Register new task definition revision
        id: register
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new_td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "new_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Verify new revision env + secrets
        run: |
          aws ecs describe-task-definition \
            --task-definition dks-ingest \
            --query 'taskDefinition.{rev:revision,image:containerDefinitions[0].image,env:containerDefinitions[0].environment[*].name,secrets:containerDefinitions[0].secrets[*].name}' \
            --output json
