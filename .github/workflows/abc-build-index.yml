name: "ABC: Build Parquet index snapshot"

# Reads the live abc_parts / abc_files / abc_features tables in forge-dks
# and writes a frozen Parquet snapshot to:
#   s3://forge-platform-data-XXX-us-east-1/abc/${version}/index/parts.parquet
#   s3://forge-platform-data-XXX-us-east-1/abc/${version}/index/parts-<ts>.parquet
#
# Run after abc-extract-to-efs has populated the index for a meaningful slice.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ABC dataset version"
        required: true
        default: "v00"
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  build:
    name: "Build index snapshot"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3 psycopg[binary]==3.2.* pyarrow
      - name: Build
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="forge-platform-data-${ACCOUNT}-${{ env.AWS_REGION }}"
          python scripts/abc/build_index.py --bucket "$BUCKET" --version "${{ inputs.version }}"
