name: Probe forge-app live TD env
on:
  workflow_dispatch:
    inputs:
      revisions:
        description: 'Comma-separated TD revisions to dump (e.g. 1052,1053,1055,1056,1057)'
        required: false
        default: '1052,1053,1055,1056,1057'
permissions: {contents: read}
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Live service current TD + key envs
        run: |
          set -e
          echo "===== LIVE SERVICE ====="
          aws ecs describe-services --cluster forge-app-dev --services forge-app-test \
            --query 'services[0].{taskDefinition:taskDefinition,running:runningCount,desired:desiredCount,deployments:deployments[].{status:status,td:taskDefinition,running:runningCount,createdAt:createdAt}}' --output json
          echo
          echo "===== ENV ON LIVE TD ====="
          LIVE_TD=$(aws ecs describe-services --cluster forge-app-dev --services forge-app-test --query 'services[0].taskDefinition' --output text)
          echo "Live TD: $LIVE_TD"
          echo '--- container names ---'
          aws ecs describe-task-definition --task-definition "$LIVE_TD" --query 'taskDefinition.containerDefinitions[].name' --output json
          echo '--- ALL env (names only) on live TD ---'
          aws ecs describe-task-definition --task-definition "$LIVE_TD" \
            --query 'taskDefinition.containerDefinitions[0].environment[].name' --output json
          echo '--- ALL secrets (names + valueFrom) on live TD ---'
          aws ecs describe-task-definition --task-definition "$LIVE_TD" \
            --query 'taskDefinition.containerDefinitions[0].secrets[].{n:name,v:valueFrom}' --output json
          echo '--- compare TD 1056 vs 1057 secret/env names diff ---'
          aws ecs describe-task-definition --task-definition forge-app-test:1056 --query 'taskDefinition.containerDefinitions[0].environment[].name' --output text | tr '\t' '\n' | sort > /tmp/env_1056
          aws ecs describe-task-definition --task-definition forge-app-test:1057 --query 'taskDefinition.containerDefinitions[0].environment[].name' --output text | tr '\t' '\n' | sort > /tmp/env_1057
          echo 'env-only-in-1056:'; comm -23 /tmp/env_1056 /tmp/env_1057
          echo 'env-only-in-1057:'; comm -13 /tmp/env_1056 /tmp/env_1057
          aws ecs describe-task-definition --task-definition forge-app-test:1056 --query 'taskDefinition.containerDefinitions[0].secrets[].name' --output text | tr '\t' '\n' | sort > /tmp/sec_1056
          aws ecs describe-task-definition --task-definition forge-app-test:1057 --query 'taskDefinition.containerDefinitions[0].secrets[].name' --output text | tr '\t' '\n' | sort > /tmp/sec_1057
          echo 'secrets-only-in-1056:'; comm -23 /tmp/sec_1056 /tmp/sec_1057
          echo 'secrets-only-in-1057:'; comm -13 /tmp/sec_1056 /tmp/sec_1057
      - name: Dump env across requested revisions
        run: |
          set -e
          IFS=',' read -ra REVS <<< "${{ inputs.revisions }}"
          for r in "${REVS[@]}"; do
            ARN="forge-app-test:$r"
            echo "===== TD $ARN ====="
            aws ecs describe-task-definition --task-definition "$ARN" \
              --query 'taskDefinition.{revision:revision,registeredAt:registeredAt,image:containerDefinitions[0].image,name:containerDefinitions[0].name,env:containerDefinitions[0].environment[?name==`MAESTRO_ENABLED` || name==`CONDUCTOR_ENABLED` || name==`CONDUCTOR_SHADOW_MODE` || name==`IMAGE_TAG`].{n:name,v:value}}' --output json || echo "(missing)"
            echo
          done
