name: "ABC: Stage chunks to S3 (raw archives)"

# Phase 2 of ABC ingest. For each (format, chunk_id) selected:
#   1. read URL from s3://.../abc/${version}/manifests/${format}_${version}.txt
#   2. download the .7z to /tmp, md5-verify against md5.yml
#   3. aws s3 cp to s3://.../abc/${version}/raw/${format}/${filename}
#   4. write per-chunk state JSON to s3://.../abc/${version}/state/...
#
# Defaults are SMOKE-MODE: chunk 0 only, all formats. Override via inputs.
# Prereq: abc-ingest-manifests.yml has run for the same version.
#
# Container: python:3.11-slim-bookworm (apt mirrors are unreachable from this
# Fargate subnet, so we install awscli via pip and use stdlib for everything
# else: hashlib for md5, urllib for downloads).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ABC dataset version (currently only v00)"
        required: true
        default: "v00"
        type: string
      formats:
        description: "Comma-separated formats to stage (meta,step,para,stl2,obj,feat,stat,ofs). 'all' = every format."
        required: true
        default: "all"
        type: string
      chunk_range:
        description: "Chunk ID range, e.g. '0-0' (smoke), '0-9', or 'all' (0-99). Inclusive."
        required: true
        default: "0-0"
        type: string
      verify_md5:
        description: "Verify md5 against md5.yml before S3 upload"
        required: false
        default: true
        type: boolean
      task_cpu:
        description: "Fargate vCPU units (1024=1 vCPU)"
        required: false
        default: "4096"
        type: string
      task_memory:
        description: "Fargate memory in MiB"
        required: false
        default: "16384"
        type: string
      task_ephemeral_gib:
        description: "Fargate ephemeral disk (GiB). 21 covers the largest chunk (stl2 ~9.4 GiB)."
        required: false
        default: "32"
        type: string

env:
  AWS_REGION: us-east-1
  CLUSTER: forge-app-dev
  SECURITY_GROUP: sg-0871ce467d6c10739

jobs:
  stage:
    name: "Stage chunks to S3"
    runs-on: ubuntu-latest
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket + subnet
        id: env
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="forge-platform-data-${ACCOUNT}-${{ env.AWS_REGION }}"
          SUBNET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='ForgePublicSubnetIds-dev'].Value" --output text | cut -d',' -f1)
          echo "bucket=$BUCKET"   >> "$GITHUB_OUTPUT"
          echo "subnet=$SUBNET"   >> "$GITHUB_OUTPUT"
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::Bucket=$BUCKET  Subnet=$SUBNET"

      - name: Resolve format + chunk lists
        id: plan
        run: |
          set -euo pipefail
          if [ "${{ inputs.formats }}" = "all" ]; then
            FORMATS="meta,step,para,stl2,obj,feat,stat,ofs"
          else
            FORMATS="${{ inputs.formats }}"
          fi
          if [ "${{ inputs.chunk_range }}" = "all" ]; then
            START=0; END=99
          else
            START=$(echo "${{ inputs.chunk_range }}" | cut -d'-' -f1)
            END=$(echo "${{ inputs.chunk_range }}"   | cut -d'-' -f2)
          fi
          echo "formats=$FORMATS"     >> "$GITHUB_OUTPUT"
          echo "chunk_start=$START"   >> "$GITHUB_OUTPUT"
          echo "chunk_end=$END"       >> "$GITHUB_OUTPUT"
          echo "::notice::Plan: formats=[$FORMATS] chunks=[$START..$END]"

      - name: Upload container script to S3
        id: payload
        run: |
          set -euo pipefail
          BUCKET="${{ steps.env.outputs.bucket }}"
          # Per-run script key keeps in-flight tasks isolated from edits.
          KEY="abc/${{ inputs.version }}/scripts/${{ github.run_id }}/container_stage.py"
          aws s3 cp scripts/abc/container_stage.py "s3://$BUCKET/$KEY" --no-progress --only-show-errors
          echo "script_uri=s3://$BUCKET/$KEY" >> "$GITHUB_OUTPUT"
          echo "::notice::Script: s3://$BUCKET/$KEY"

      - name: Launch Fargate task
        id: launch
        run: |
          set -euo pipefail
          TASK_DEF=$(aws ecs list-task-definitions --family-prefix dks-download \
            --sort DESC --max-items 1 --query 'taskDefinitionArns[0]' --output text)
          echo "Task def: $TASK_DEF"

          BUCKET="${{ steps.env.outputs.bucket }}"
          SCRIPT_URI="${{ steps.payload.outputs.script_uri }}"

          # Container bootstrap: install awscli via pip, fetch script from S3, run it.
          # All real logic is in scripts/abc/container_stage.py — reads env vars
          # ABC_BUCKET, ABC_VERSION, ABC_FORMATS, ABC_CHUNK_START, ABC_CHUNK_END,
          # ABC_VERIFY_MD5. Single-line to stay under ECS 8 KiB overrides cap.
          BOOTSTRAP="set -euo pipefail; echo \"=== ABC stage-to-s3 \$(date -u) ===\"; pip install --quiet --no-cache-dir --root-user-action=ignore awscli boto3; aws s3 cp \"\$ABC_SCRIPT_URI\" /tmp/run.py --no-progress --only-show-errors; exec python3 /tmp/run.py"

          OVERRIDES=$(jq -nc \
            --argjson cpu     "${{ inputs.task_cpu }}" \
            --argjson mem     "${{ inputs.task_memory }}" \
            --argjson eph     "${{ inputs.task_ephemeral_gib }}" \
            --arg     cmd     "$BOOTSTRAP" \
            --arg     bucket  "$BUCKET" \
            --arg     version "${{ inputs.version }}" \
            --arg     formats "${{ steps.plan.outputs.formats }}" \
            --arg     cstart  "${{ steps.plan.outputs.chunk_start }}" \
            --arg     cend    "${{ steps.plan.outputs.chunk_end }}" \
            --arg     verify  "${{ inputs.verify_md5 }}" \
            --arg     script  "$SCRIPT_URI" \
            '{
               cpu: ($cpu|tostring),
               memory: ($mem|tostring),
               ephemeralStorage: { sizeInGiB: $eph },
               containerOverrides: [{
                 name: "downloader",
                 cpu: $cpu,
                 memory: $mem,
                 command: ["bash","-c", $cmd],
                 environment: [
                   {name:"ABC_BUCKET",       value:$bucket},
                   {name:"ABC_VERSION",      value:$version},
                   {name:"ABC_FORMATS",      value:$formats},
                   {name:"ABC_CHUNK_START",  value:$cstart},
                   {name:"ABC_CHUNK_END",    value:$cend},
                   {name:"ABC_VERIFY_MD5",   value:$verify},
                   {name:"ABC_SCRIPT_URI",   value:$script}
                 ]
               }]
             }')

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.CLUSTER }} \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE --platform-version LATEST \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.env.outputs.subnet }}],securityGroups=[${{ env.SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' --output text)
          TASK_ID=$(echo "$TASK_ARN" | rev | cut -d'/' -f1 | rev)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "task_id=$TASK_ID"   >> "$GITHUB_OUTPUT"
          echo "::notice::Task ID: $TASK_ID"

      - name: Monitor task
        run: |
          TASK_ARN="${{ steps.launch.outputs.task_arn }}"
          TIMEOUT=21600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text 2>/dev/null || echo UNKNOWN)
            echo "[$((ELAPSED/60))m] $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              EXIT=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
                --query 'tasks[0].containers[0].exitCode' --output text)
              REASON=$(aws ecs describe-tasks --cluster ${{ env.CLUSTER }} --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              echo "exit=$EXIT reason=$REASON"
              [ "$EXIT" = "0" ] && exit 0
              echo "::error::Stage task failed (exit $EXIT): $REASON"
              exit 1
            fi
            sleep 30; ELAPSED=$((ELAPSED + 30))
          done
          echo "::error::Timeout"
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          TASK_ID="${{ steps.launch.outputs.task_id }}"
          STREAM="dks-download/downloader/$TASK_ID"
          echo "=== CloudWatch /forge/ecs/dks-ingest stream $STREAM ==="
          aws logs get-log-events \
            --log-group-name /forge/ecs/dks-ingest \
            --log-stream-name "$STREAM" \
            --start-from-head \
            --limit 500 \
            --query 'events[].message' --output text 2>&1 | tail -300 || true

  upsert-index:
    name: "Upsert abc_chunks rows into Supabase"
    needs: stage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3 psycopg[binary]==3.2.* pyyaml
      - name: Upsert
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="forge-platform-data-${ACCOUNT}-${{ env.AWS_REGION }}"
          python scripts/abc/upsert_chunks.py \
            --bucket "$BUCKET" \
            --version "${{ inputs.version }}"
