name: DKS — Tail Active Log
on:
  workflow_dispatch:
jobs:
  tail:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Tail newest dks-ingest stream
        run: |
          LATEST=$(aws logs describe-log-streams --log-group-name /forge/ecs/dks-ingest \
            --order-by LastEventTime --descending --limit 3 --region us-east-1 \
            --query 'logStreams[].logStreamName' --output text)
          echo "Top 3 streams: $LATEST"
          NEWEST=$(echo "$LATEST" | awk '{print $1}')
          echo "=== $NEWEST (last 80 events) ==="
          aws logs get-log-events --log-group-name /forge/ecs/dks-ingest \
            --log-stream-name "$NEWEST" --region us-east-1 \
            --limit 80 --query 'events[].message' --output text
