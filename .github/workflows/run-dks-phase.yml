# ================================================================
# run-dks-phase.yml — Execute DKS ingestion phases on Fargate
# ================================================================
name: "DKS: Run Phase"

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run"
        required: true
        type: choice
        options:
          - 0a-schema
          - bq-dryrun
          - 1a-bq
          - 1a-stage
          - 1b-harvest
          - 1b-smoke
      env:
        description: "Target environment (cluster suffix)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
      source:
        description: "Objective/source for 1a-stage / 1b phases (1a-bq is patents-only)"
        required: false
        default: "patents"
        type: choice
        options:
          - patents
          - arxiv
          - materials
      max_docs:
        description: "Cap docs processed (blank = phase default; 1b-smoke defaults to 8)"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Override poll timeout in minutes (blank = phase default: 1b-harvest=90, 1b-smoke=20, 1a-stage=60, others=10)"
        required: false
        type: string
        default: ""
      patent_scope:
        description: "Patent extract scope for 1a-bq (target=legacy 1K T1, all_estimate=BQ dry-run across all USPTO, all_sample=bounded export, all_export=full ramp — requires force_full_all)"
        required: false
        default: "target"
        type: choice
        options:
          - target
          - all_estimate
          - all_sample
          - all_export
      year_range:
        description: "Publication year range for all-USPTO scopes, e.g. 2015-2024 or single year 2024 (ignored for target)"
        required: false
        type: string
        default: ""
      max_rows:
        description: "Row cap for all_sample (default 10000) and safety ceiling for all_export (default 0=unbounded when force_full_all=true)"
        required: false
        type: string
        default: ""
      force_full_all:
        description: "Safety gate: must be 'true' to run patent_scope=all_export with no max_rows (cost guard)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      patents_dir:
        description: "Override patents corpus dir for 1b phases (blank=default /data/patents_t1/; e.g. /data/patents_all_sample/ or /data/patents_all/)"
        required: false
        type: string
        default: ""
      per_doc_timeout_sec:
        description: "Bounded harvester: per-document Vertex timeout in seconds (1b-smoke/1b-harvest only; blank=image default 120; 1b-smoke phase default 300)"
        required: false
        type: string
        default: ""
      per_doc_max_attempts:
        description: "Bounded harvester: per-document retry attempts (1b-smoke/1b-harvest only; blank=image default 2)"
        required: false
        type: string
        default: ""
      run_timeout_sec:
        description: "Bounded harvester: overall run timeout in seconds, 0 = unbounded (1b-smoke/1b-harvest only; blank=image default 0; 1b-smoke phase default 1100 — just under 1200s poll)"
        required: false
        type: string
        default: ""
      progress_every_docs:
        description: "Bounded harvester: emit progress log every N docs (1b-smoke/1b-harvest only; blank=image default 10; 1b-smoke phase default 1)"
        required: false
        type: string
        default: ""
      progress_every_sec:
        description: "Bounded harvester: emit progress log every N seconds (1b-smoke/1b-harvest only; blank=image default 60; 1b-smoke phase default 30)"
        required: false
        type: string
        default: ""

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "266087050444"

jobs:
  run-phase:
    name: "Phase ${{ inputs.phase }} (${{ inputs.env }}, ${{ inputs.source }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve cluster + network config
        id: net
        env:
          TENV: ${{ inputs.env }}
        run: |
          set -euo pipefail
          CLUSTER="forge-app-${TENV}"
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
                      "Name=tag:aws-cdk:subnet-type,Values=Private" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',' || true)

          if [ -z "$SUBNETS" ]; then
            SUBNETS=$(aws ec2 describe-subnets \
              --filters "Name=tag:aws-cdk:subnet-type,Values=Private" \
              --query 'Subnets[0:2].SubnetId' --output text | tr '\t' ',')
          fi

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=*EcsSecurityGroup*" \
                      "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=*EcsSecurityGroup*" \
              --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          fi
          # Last-resort fallback to known-good SG for forge-app-dev
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG="sg-0871ce467d6c10739"
            echo "note: using hardcoded fallback SG $SG"
          fi

          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          echo "sg=$SG" >> $GITHUB_OUTPUT
          echo "Cluster : $CLUSTER"
          echo "Subnets : $SUBNETS"
          echo "SG      : $SG"

      - name: Verify dks-ingest task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition dks-ingest \
            --query 'taskDefinition.{family:family,rev:revision,image:containerDefinitions[0].image,env:containerDefinitions[0].environment[*].name,secrets:containerDefinitions[0].secrets[*].name}' \
            --output json

      - name: Write command script for phase
        id: cmd
        env:
          PHASE: ${{ inputs.phase }}
          SOURCE: ${{ inputs.source }}
          INPUT_MAX_DOCS: ${{ inputs.max_docs }}
          INPUT_PATENT_SCOPE: ${{ inputs.patent_scope }}
          INPUT_YEAR_RANGE: ${{ inputs.year_range }}
          INPUT_MAX_ROWS: ${{ inputs.max_rows }}
          INPUT_FORCE_FULL_ALL: ${{ inputs.force_full_all }}
          INPUT_PATENTS_DIR: ${{ inputs.patents_dir }}
          INPUT_PER_DOC_TIMEOUT_SEC: ${{ inputs.per_doc_timeout_sec }}
          INPUT_PER_DOC_MAX_ATTEMPTS: ${{ inputs.per_doc_max_attempts }}
          INPUT_RUN_TIMEOUT_SEC: ${{ inputs.run_timeout_sec }}
          INPUT_PROGRESS_EVERY_DOCS: ${{ inputs.progress_every_docs }}
          INPUT_PROGRESS_EVERY_SEC: ${{ inputs.progress_every_sec }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase

          # ---- Source routing (1b phases) --------------------------------
          # Map workflow input `source` to:
          #   - CORPUS_DIR      : EFS path holding the input corpus
          #   - SOURCE_DIR_FLAG : CLI flag dks_harvest.py expects for that dir
          #   - DATASET_CANON   : canonical source_dataset value written by the
          #                       harvester (for the zero-output guardrail)
          #   - DATASET_ALT     : legacy/alt value also accepted by the guardrail
          #                       via coalesce(source_dataset, source_file).
          # 1a-bq is patents-only (BigQuery extract script is patents-specific);
          # for arxiv/materials the corpus must already exist on EFS before a
          # 1b-harvest/1b-smoke run is dispatched — this is documented in the
          # in-container preflight log below.
          case "$SOURCE" in
            patents)
              CORPUS_DIR="/data/patents_t1/"
              SOURCE_DIR_FLAG="--patents-dir"
              DATASET_CANON="uspto_patents"
              DATASET_ALT="patents"
              STAGER_SCRIPT=""
              # Optional override so 1b-smoke/1b-harvest can point at
              # all-USPTO sample/export dirs produced by patent_scope=all_*.
              # Only honored for the patents source; arxiv/materials have
              # their own stager paths.
              if [ -n "${INPUT_PATENTS_DIR:-}" ]; then
                case "$INPUT_PATENTS_DIR" in
                  /data/patents_t1/|/data/patents_all/|/data/patents_all_sample/)
                    CORPUS_DIR="$INPUT_PATENTS_DIR"
                    echo "note: patents_dir override active — CORPUS_DIR=$CORPUS_DIR"
                    ;;
                  *)
                    echo "::error::patents_dir must be one of /data/patents_t1/ | /data/patents_all/ | /data/patents_all_sample/ (got: $INPUT_PATENTS_DIR)"
                    exit 1 ;;
                esac
              fi
              ;;
            arxiv)
              CORPUS_DIR="/data/arxiv_t1/"
              SOURCE_DIR_FLAG="--arxiv-dir"
              DATASET_CANON="arxiv_papers"
              DATASET_ALT="arxiv"
              STAGER_SCRIPT="scripts/stage_arxiv_t1.py"
              ;;
            materials)
              CORPUS_DIR="/data/materials_t1/"
              SOURCE_DIR_FLAG="--materials-dir"
              DATASET_CANON="materials_catalog"
              DATASET_ALT="materials"
              STAGER_SCRIPT="scripts/stage_materials_t1.py"
              ;;
            *)
              echo "::error::unknown source: $SOURCE"; exit 1 ;;
          esac
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "corpus_dir=$CORPUS_DIR" >> $GITHUB_OUTPUT
          echo "dataset_canon=$DATASET_CANON" >> $GITHUB_OUTPUT
          echo "Resolved source=$SOURCE corpus_dir=$CORPUS_DIR dir_flag=$SOURCE_DIR_FLAG dataset=$DATASET_CANON|$DATASET_ALT"

          # Resolve DKS_MAX_DOCS: explicit input wins; otherwise 1b-smoke defaults to 8.
          MAX_DOCS=""
          if [ -n "${INPUT_MAX_DOCS:-}" ]; then
            MAX_DOCS="$INPUT_MAX_DOCS"
          elif [ "$PHASE" = "1b-smoke" ]; then
            MAX_DOCS="8"
          fi
          echo "max_docs=$MAX_DOCS" >> $GITHUB_OUTPUT
          echo "Resolved DKS_MAX_DOCS: '${MAX_DOCS:-<unset>}'"

          # ---- Bounded-harvester runtime config (1b-smoke / 1b-harvest) ----
          # The dks-ingest image reads these as env vars and falls back to its
          # built-in defaults when unset (per_doc_timeout_sec=120,
          # per_doc_max_attempts=2, run_timeout_sec=0 (unbounded),
          # progress_every_docs=10, progress_every_sec=60).
          #
          # Phase defaults override image defaults only when the operator did
          # NOT set the corresponding workflow input — preserving existing
          # behavior for every other phase. For 1b-smoke we pick tighter
          # values so a capped run completes (or aborts cleanly) well under
          # the 1200s poll ceiling and emits progress on every doc:
          #   per_doc_timeout_sec  = 300   (first USPTO doc needed >120s)
          #   per_doc_max_attempts = 2
          #   run_timeout_sec      = 1100  (just under 1200s poll timeout)
          #   progress_every_docs  = 1
          #   progress_every_sec   = 30
          # For 1b-harvest we leave the image defaults alone unless the
          # operator supplies an override.
          PER_DOC_TIMEOUT_SEC=""
          PER_DOC_MAX_ATTEMPTS=""
          RUN_TIMEOUT_SEC=""
          PROGRESS_EVERY_DOCS=""
          PROGRESS_EVERY_SEC=""
          if [ "$PHASE" = "1b-smoke" ] || [ "$PHASE" = "1b-harvest" ]; then
            PER_DOC_TIMEOUT_SEC="${INPUT_PER_DOC_TIMEOUT_SEC:-}"
            PER_DOC_MAX_ATTEMPTS="${INPUT_PER_DOC_MAX_ATTEMPTS:-}"
            RUN_TIMEOUT_SEC="${INPUT_RUN_TIMEOUT_SEC:-}"
            PROGRESS_EVERY_DOCS="${INPUT_PROGRESS_EVERY_DOCS:-}"
            PROGRESS_EVERY_SEC="${INPUT_PROGRESS_EVERY_SEC:-}"
            if [ "$PHASE" = "1b-smoke" ]; then
              [ -z "$PER_DOC_TIMEOUT_SEC" ]  && PER_DOC_TIMEOUT_SEC="300"
              [ -z "$PER_DOC_MAX_ATTEMPTS" ] && PER_DOC_MAX_ATTEMPTS="2"
              [ -z "$RUN_TIMEOUT_SEC" ]      && RUN_TIMEOUT_SEC="1100"
              [ -z "$PROGRESS_EVERY_DOCS" ]  && PROGRESS_EVERY_DOCS="1"
              [ -z "$PROGRESS_EVERY_SEC" ]   && PROGRESS_EVERY_SEC="30"
            fi
            # Validate non-empty values are non-negative integers.
            for pair in \
              "per_doc_timeout_sec:$PER_DOC_TIMEOUT_SEC" \
              "per_doc_max_attempts:$PER_DOC_MAX_ATTEMPTS" \
              "run_timeout_sec:$RUN_TIMEOUT_SEC" \
              "progress_every_docs:$PROGRESS_EVERY_DOCS" \
              "progress_every_sec:$PROGRESS_EVERY_SEC"; do
              key="${pair%%:*}"; val="${pair#*:}"
              if [ -n "$val" ] && ! echo "$val" | grep -Eq '^[0-9]+$'; then
                echo "::error::$key must be a non-negative integer (got: $val)"
                exit 1
              fi
            done
          fi
          echo "Bounded harvester config:"
          echo "  per_doc_timeout_sec  = '${PER_DOC_TIMEOUT_SEC:-<image default>}'"
          echo "  per_doc_max_attempts = '${PER_DOC_MAX_ATTEMPTS:-<image default>}'"
          echo "  run_timeout_sec      = '${RUN_TIMEOUT_SEC:-<image default>}'"
          echo "  progress_every_docs  = '${PROGRESS_EVERY_DOCS:-<image default>}'"
          echo "  progress_every_sec   = '${PROGRESS_EVERY_SEC:-<image default>}'"

          case "$PHASE" in
            0a-schema)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          echo ">>> applying sql/129_dks_knowledge_chunks.sql"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/sql/129_dks_knowledge_chunks.sql
          echo ">>> verify tables"
          psql "$DATABASE_URL" -c "\dt design_knowledge_chunks"
          psql "$DATABASE_URL" -c "\dt dks_runlog" || true
          psql "$DATABASE_URL" -c "select count(*) as baseline from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select indexname from pg_indexes where tablename='design_knowledge_chunks';"
          echo ">>> Phase 0a complete"
          EOS
              ;;
            bq-dryrun)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"
          echo ">>> BigQuery dry-run T1"
          python3 scripts/extract_bigquery.py --tier t1 --dry-run
          EOS
              ;;
            1a-bq)
              # 1a-bq is patents-only. If the user selected a non-patents
              # source, fail fast rather than silently running the patents
              # extract — arxiv/materials corpora are produced by a different
              # pipeline documented in the 1b preflight.
              if [ "$SOURCE" != "patents" ]; then
                echo "::error::Phase 1a-bq is patents-only (got source=$SOURCE)."
                echo "::error::For arxiv/materials, stage the corpus on EFS first, then run 1b-harvest/1b-smoke."
                exit 1
              fi

              # ---- patent_scope routing ----
              # target       : existing 1K T1 extract into /data/patents_t1/ (backward compatible default)
              # all_estimate : BigQuery dry-run over the all-USPTO query — returns bytes_processed only, no rows written
              # all_sample   : bounded export into /data/patents_all_sample/ capped by max_rows (default 10000)
              # all_export   : full all-USPTO export into /data/patents_all/ — requires force_full_all=true
              #                UNLESS max_rows is set (bounded exports are always permitted as a safety ramp)
              PSCOPE="${INPUT_PATENT_SCOPE:-target}"
              YRANGE="${INPUT_YEAR_RANGE:-}"
              MAX_ROWS="${INPUT_MAX_ROWS:-}"
              FFALL="${INPUT_FORCE_FULL_ALL:-false}"
              echo ">>> 1a-bq patent_scope=$PSCOPE year_range='${YRANGE:-<unset>}' max_rows='${MAX_ROWS:-<unset>}' force_full_all=$FFALL"

              # Validate year_range format (YYYY or YYYY-YYYY) when provided
              if [ -n "$YRANGE" ]; then
                if ! echo "$YRANGE" | grep -Eq '^[0-9]{4}(-[0-9]{4})?$'; then
                  echo "::error::year_range must be YYYY or YYYY-YYYY (got: $YRANGE)"
                  exit 1
                fi
              fi

              # Validate max_rows is a non-negative integer when provided
              if [ -n "$MAX_ROWS" ]; then
                if ! echo "$MAX_ROWS" | grep -Eq '^[0-9]+$'; then
                  echo "::error::max_rows must be a non-negative integer (got: $MAX_ROWS)"
                  exit 1
                fi
              fi

              case "$PSCOPE" in
                target)
                  if [ -n "$YRANGE" ] || [ -n "$MAX_ROWS" ] || [ "$FFALL" = "true" ]; then
                    echo "::warning::patent_scope=target ignores year_range/max_rows/force_full_all (legacy 1K T1 path)"
                  fi
                  EXPORT_CMD='python3 scripts/extract_bigquery.py --tier t1 --output /data/patents_t1/ --local --force'
                  EXPORT_OUTDIR='/data/patents_t1'
                  ;;
                all_estimate)
                  # BigQuery dry-run only — forgenew exporter returns bytes_processed.
                  # No rows written, no output dir created. The exporter CLI uses
                  # --tier all to select the full USPTO scope; there is no --scope
                  # flag and no --estimate flag (dry-run IS the estimate mode).
                  YFLAG=""
                  [ -n "$YRANGE" ] && YFLAG="--year-range $YRANGE"
                  EXPORT_CMD="python3 scripts/extract_bigquery.py --tier all --dry-run $YFLAG"
                  EXPORT_OUTDIR=""
                  ;;
                all_sample)
                  # Bounded sample into /data/patents_all_sample/. Default cap 10K rows.
                  EFFECTIVE_ROWS="${MAX_ROWS:-10000}"
                  if [ "$EFFECTIVE_ROWS" -le 0 ] 2>/dev/null; then
                    echo "::error::patent_scope=all_sample requires max_rows > 0 (got: $EFFECTIVE_ROWS)"
                    exit 1
                  fi
                  YFLAG=""
                  [ -n "$YRANGE" ] && YFLAG="--year-range $YRANGE"
                  EXPORT_CMD="python3 scripts/extract_bigquery.py --tier all --output /data/patents_all_sample/ --local --force --max-rows $EFFECTIVE_ROWS $YFLAG"
                  EXPORT_OUTDIR='/data/patents_all_sample'
                  ;;
                all_export)
                  # Full all-USPTO ramp into /data/patents_all/. Requires either:
                  #   - force_full_all=true (unbounded full export), OR
                  #   - max_rows>0          (bounded ramp — safe without the hard gate)
                  if [ -z "$MAX_ROWS" ] && [ "$FFALL" != "true" ]; then
                    echo "::error::patent_scope=all_export without max_rows requires force_full_all=true (cost guard)."
                    echo "::error::Either set max_rows=<N> for a bounded ramp, or set force_full_all=true for the full extract."
                    exit 1
                  fi
                  RFLAG=""
                  [ -n "$MAX_ROWS" ] && RFLAG="--max-rows $MAX_ROWS"
                  YFLAG=""
                  [ -n "$YRANGE" ] && YFLAG="--year-range $YRANGE"
                  EXPORT_CMD="python3 scripts/extract_bigquery.py --tier all --output /data/patents_all/ --local --force $RFLAG $YFLAG"
                  EXPORT_OUTDIR='/data/patents_all'
                  ;;
                *)
                  echo "::error::unknown patent_scope: $PSCOPE"
                  exit 1 ;;
              esac
              echo ">>> export cmd: $EXPORT_CMD"
              echo "patent_scope=$PSCOPE" >> $GITHUB_OUTPUT
              echo "export_outdir=$EXPORT_OUTDIR" >> $GITHUB_OUTPUT

              cat > /tmp/phase/cmd.sh <<EOS
          set -euo pipefail
          # Materialize GCP SA key for ADC (BigQuery client needs this)
          mkdir -p /tmp/gcp
          printf '%s' "\$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="\${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"
          echo ">>> /data mount info:"
          df -T /data 2>&1 || echo "(df failed)"
          mount | grep -E "/data|efs" || echo "(no efs mount)"
          echo ">>> patent_scope=$PSCOPE"
          if [ -n "$EXPORT_OUTDIR" ]; then
            mkdir -p "$EXPORT_OUTDIR"
          fi
          # CLI-drift probe: surface the actual exporter usage in the task log
          # so future arg renames (e.g. --years vs --year-range) are obvious
          # without needing to re-run a failed export.
          echo ">>> exporter --help (CLI drift probe):"
          python3 scripts/extract_bigquery.py --help 2>&1 | sed -n '1,40p' || true
          echo ">>> running: $EXPORT_CMD"
          $EXPORT_CMD
          if [ -n "$EXPORT_OUTDIR" ]; then
            ls -la "$EXPORT_OUTDIR/" || true
            wc -l "$EXPORT_OUTDIR"/*.jsonl 2>/dev/null || true
          else
            echo ">>> dry-run/estimate complete — no output directory written"
          fi
          EOS
              ;;
            1a-stage)
              # 1a-stage materializes the arxiv or materials corpus onto EFS at
              # the same /data/<src>_t1/ path that 1b-harvest/1b-smoke expect.
              # Patents are produced by 1a-bq; staging patents here is a no-op
              # error to avoid ambiguity.
              if [ "$SOURCE" = "patents" ]; then
                echo "::error::Phase 1a-stage is arxiv/materials-only; use 1a-bq for patents."
                exit 1
              fi
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC (stagers may hit GCS for source data).
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"

          SRC="__SRC__"
          OUT_DIR="__CORPUS_DIR__"
          STAGER="__STAGER__"

          echo ">>> staging source=$SRC into $OUT_DIR via $STAGER"
          echo ">>> /data mount info:"
          df -T /data 2>&1 || echo "(df failed)"
          mount | grep -E "/data|efs" || echo "(no efs mount)"

          mkdir -p "$OUT_DIR"

          LIMIT_ARGS=()
          if [ -n "${DKS_MAX_DOCS:-}" ] && [ "${DKS_MAX_DOCS}" -gt 0 ] 2>/dev/null; then
            LIMIT_ARGS=(--limit "$DKS_MAX_DOCS")
            echo ">>> applying --limit $DKS_MAX_DOCS"
          fi

          if [ ! -f "/app/$STAGER" ] && [ ! -f "$STAGER" ]; then
            echo "::error::stager script not found at /app/$STAGER or $STAGER in container"
            echo "::error::rebuild dks-ingest image with forgenew stager scripts or mount them in"
            exit 1
          fi

          STAGER_PATH="$STAGER"
          if [ -f "/app/$STAGER" ]; then STAGER_PATH="/app/$STAGER"; fi
          echo ">>> invoking: python3 $STAGER_PATH --output $OUT_DIR ${LIMIT_ARGS[*]}"
          python3 "$STAGER_PATH" --output "$OUT_DIR" "${LIMIT_ARGS[@]}"

          echo ">>> staged corpus listing (top 20):"
          ls -la "$OUT_DIR" | head -20 || true

          # Count output files/lines WITHOUT relying on shell globs that
          # return non-zero when unmatched — under `set -euo pipefail` the
          # outer assignment then aborts the whole script even though the
          # stager succeeded. Use `find` for enumeration (always exits 0)
          # and stream matches into `cat`/`wc` so a no-match case yields 0.
          FILE_COUNT=$(find "$OUT_DIR" -maxdepth 1 -type f \( -name '*.jsonl' -o -name '*.json' \) | wc -l | tr -d ' ')
          JSONL_LINES=$(find "$OUT_DIR" -maxdepth 1 -type f -name '*.jsonl' -exec cat {} + 2>/dev/null | wc -l | tr -d ' ')
          JSON_FILES=$(find "$OUT_DIR" -maxdepth 1 -type f -name '*.json' | wc -l | tr -d ' ')
          echo ">>> file count : $FILE_COUNT"
          echo ">>> jsonl lines: $JSONL_LINES"
          echo ">>> json files : $JSON_FILES"

          echo ">>> sample lines (first 3 from first jsonl shard):"
          FIRST_JSONL=$(find "$OUT_DIR" -maxdepth 1 -type f -name '*.jsonl' 2>/dev/null | sort | head -n1 || true)
          if [ -n "$FIRST_JSONL" ]; then
            head -n 3 "$FIRST_JSONL" || true
          else
            FIRST_JSON=$(find "$OUT_DIR" -maxdepth 1 -type f -name '*.json' 2>/dev/null | sort | head -n1 || true)
            if [ -n "$FIRST_JSON" ]; then
              head -c 2000 "$FIRST_JSON" || true
              echo
            fi
          fi

          if [ "$FILE_COUNT" -eq 0 ] || { [ "$JSONL_LINES" -eq 0 ] && [ "$JSON_FILES" -eq 0 ]; }; then
            echo "::error::Phase 1a-stage produced empty output at $OUT_DIR for $SRC"
            exit 2
          fi
          echo ">>> Phase 1a-stage complete for $SRC ($FILE_COUNT files, $JSONL_LINES jsonl lines, $JSON_FILES json files)"
          EOS
              ;;
            1b-harvest|1b-smoke)
              # Template vars expanded into the heredoc by envsubst-style
              # bash substitution. __SRC__ etc. are placeholders replaced
              # below so the body stays quoted-heredoc-safe for everything
              # else (preserves $VARS meant for in-container eval).
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC (Vertex client needs this alongside env JSON fallback)
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"

          # ---- Source routing (baked in at dispatch time) ----
          SRC="__SRC__"
          CORPUS_DIR="__CORPUS_DIR__"
          SRC_FLAG="__SRC_FLAG__"
          DATASET_CANON="__DATASET_CANON__"
          DATASET_ALT="__DATASET_ALT__"
          echo ">>> running for source=$SRC"
          echo ">>> corpus dir: $CORPUS_DIR (flag $SRC_FLAG)"
          echo ">>> expected source_dataset values: $DATASET_CANON | $DATASET_ALT"

          # Preflight: corpus must exist on EFS. For arxiv/materials this
          # means the out-of-band stager has run; 1a-bq only produces the
          # patents corpus.
          if [ ! -d "$CORPUS_DIR" ]; then
            echo "::error::corpus dir $CORPUS_DIR not present on EFS"
            if [ "$SRC" != "patents" ]; then
              echo "::error::$SRC corpus must be staged on EFS before running 1b (1a-bq is patents-only)."
            fi
            exit 1
          fi
          echo ">>> corpus dir listing (top 20):"
          ls -la "$CORPUS_DIR" 2>/dev/null | head -20 || true

          # ---- Vertex dedicated-DNS preflight ----
          # Fail fast (and cheaply) if the per-endpoint dedicated DNS host does
          # not resolve or TCP/443 is unreachable from the Fargate subnet.
          if [ "${GEMMA_VERTEX_DEDICATED_DNS:-false}" = "true" ]; then
            DNS_PREFIX="${GEMMA_VERTEX_DEDICATED_DNS_PREFIX:-${GEMMA_VERTEX_ENDPOINT_ID:-}}"
            PROJ_NUM="${GEMMA_VERTEX_PROJECT_NUMBER:-}"
            REGION="${GEMMA_VERTEX_REGION:-us-central1}"
            if [ -z "$DNS_PREFIX" ] || [ -z "$PROJ_NUM" ]; then
              echo "::error::dedicated DNS preflight: missing DNS_PREFIX or PROJECT_NUMBER"
              exit 3
            fi
            VERTEX_HOST="${DNS_PREFIX}.${REGION}-${PROJ_NUM}.prediction.vertexai.goog"
            echo ">>> vertex dedicated DNS preflight: $VERTEX_HOST"
            if ! getent hosts "$VERTEX_HOST" >/dev/null 2>&1; then
              echo "::error::DNS resolution failed for $VERTEX_HOST"
              exit 3
            fi
            if ! timeout 5 bash -c ">/dev/tcp/${VERTEX_HOST}/443" 2>/dev/null; then
              echo "::error::TCP 443 unreachable for $VERTEX_HOST"
              exit 3
            fi
            echo ">>> preflight ok: $VERTEX_HOST resolves and accepts TCP/443"
          fi

          mkdir -p /data/logs
          LOG=/data/logs/phase1_${SRC}_$(date +%Y%m%d_%H%M%S).log

          # ---- Bounded-harvester doc cap ----
          # The patched dks-ingest image exposes --max-docs on dks_harvest.py,
          # which applies uniformly across patents/arxiv/materials corpora
          # (regardless of jsonl vs json file layout). When DKS_MAX_DOCS is
          # set we forward it as --max-docs N rather than materializing a
          # capped copy of the corpus — the old bash cap only worked for
          # jsonl/json files and didn't map cleanly onto every source.
          USE_DIR="$CORPUS_DIR"
          MAX_DOCS_FLAG=()
          if [ -n "${DKS_MAX_DOCS:-}" ] && [ "${DKS_MAX_DOCS}" -gt 0 ] 2>/dev/null; then
            MAX_DOCS_FLAG=(--max-docs "${DKS_MAX_DOCS}")
            echo ">>> bounded harvester: --max-docs ${DKS_MAX_DOCS} (no corpus pre-cap)"
          fi

          # ---- CLI drift probe ----
          # Surface dks_harvest.py --help so future arg renames (e.g.
          # --max-docs vs --limit) are obvious from the task log without
          # needing to re-run the failing harvest.
          echo ">>> dks_harvest.py --help (CLI drift probe):"
          python3 dks_harvest.py --help 2>&1 | sed -n '1,80p' || true

          # Baseline chunk count BEFORE harvest so we can diff after.
          # Uses coalesce(source_dataset, source_file) so legacy rows that only
          # populated source_file are still counted for the guardrail.
          BASELINE_SRC_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where coalesce(source_dataset, source_file) in ('$DATASET_CANON','$DATASET_ALT');")
          BASELINE_TOTAL_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks;")
          BASELINE_LEGACY_SRC_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where source_dataset is null and source_file in ('$DATASET_CANON','$DATASET_ALT');")
          echo ">>> baseline $SRC chunks         : $BASELINE_SRC_CHUNKS"
          echo ">>> baseline legacy $SRC chunks  : $BASELINE_LEGACY_SRC_CHUNKS (source_dataset IS NULL, source_file in ($DATASET_CANON|$DATASET_ALT))"
          echo ">>> baseline total chunks        : $BASELINE_TOTAL_CHUNKS"

          echo ">>> harvest $SRC via vertex (dir=$USE_DIR flag=$SRC_FLAG max_docs='${DKS_MAX_DOCS:-<unset>}')"
          python3 dks_harvest.py --source "$SRC" "$SRC_FLAG" "$USE_DIR" --backend vertex --validate "${MAX_DOCS_FLAG[@]}" 2>&1 | tee "$LOG"

          echo ">>> post-ingest counts"
          psql "$DATABASE_URL" -c "select count(*) as total_chunks from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select chunk_type, count(*) from design_knowledge_chunks group by chunk_type order by 2 desc;"
          psql "$DATABASE_URL" -c "select source_dataset, count(*) from design_knowledge_chunks group by source_dataset order by 2 desc limit 10;"
          psql "$DATABASE_URL" -c "select 'legacy_${SRC}_null_dataset' as bucket, count(*) from design_knowledge_chunks where source_dataset is null and source_file in ('$DATASET_CANON','$DATASET_ALT');"
          psql "$DATABASE_URL" -c "select coalesce(source_dataset, source_file) as provenance, count(*) from design_knowledge_chunks group by coalesce(source_dataset, source_file) order by 2 desc limit 10;"
          psql "$DATABASE_URL" -c "select column_name, data_type from information_schema.columns where table_name='design_knowledge_chunks' order by ordinal_position;" || true
          psql "$DATABASE_URL" -c "select phase, source, status, backend, row_count_delta, duration_ms, cost_estimate_usd, created_at from dks_runlog order by created_at desc limit 5;"

          # ---- Zero-output guardrail ----
          # Fail the task if the harvest inserted zero new chunks for this
          # source, even when dks_harvest.py reported success. Checks:
          #   1) design_knowledge_chunks row count for coalesce(source_dataset,
          #      source_file) in (canonical, alt) must have grown vs baseline.
          #   2) The latest dks_runlog row for phase1b_harvest / <source> must
          #      have status='success' AND row_count_delta > 0.
          echo ">>> validating row_count_delta and chunk growth"
          POST_SRC_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where coalesce(source_dataset, source_file) in ('$DATASET_CANON','$DATASET_ALT');")
          POST_LEGACY_SRC_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where source_dataset is null and source_file in ('$DATASET_CANON','$DATASET_ALT');")
          SRC_DELTA=$(( POST_SRC_CHUNKS - BASELINE_SRC_CHUNKS ))
          LEGACY_SRC_DELTA=$(( POST_LEGACY_SRC_CHUNKS - BASELINE_LEGACY_SRC_CHUNKS ))
          echo "post $SRC chunks        : $POST_SRC_CHUNKS"
          echo "post legacy $SRC chunks : $POST_LEGACY_SRC_CHUNKS"
          echo "$SRC chunk delta        : $SRC_DELTA"
          echo "legacy $SRC chunk delta : $LEGACY_SRC_DELTA"

          RUNLOG_ROW=$(psql "$DATABASE_URL" -At -F '|' -c \
            "select coalesce(status,''), coalesce(row_count_delta,0)
               from dks_runlog
              where phase='phase1b_harvest' and source='$SRC'
              order by created_at desc
              limit 1;")
          RUNLOG_STATUS="${RUNLOG_ROW%%|*}"
          RUNLOG_DELTA="${RUNLOG_ROW##*|}"
          if [ -z "$RUNLOG_ROW" ]; then
            RUNLOG_STATUS="missing"; RUNLOG_DELTA="0"
          fi
          echo "runlog status         : $RUNLOG_STATUS"
          echo "runlog row_count_delta: $RUNLOG_DELTA"

          FAIL=0
          if [ "$SRC_DELTA" -le 0 ]; then
            echo "::error::phase1b_harvest produced zero new $SRC chunks (delta=$SRC_DELTA)"
            FAIL=1
          fi
          if [ "$RUNLOG_STATUS" != "success" ]; then
            echo "::error::latest dks_runlog row is not success (status=$RUNLOG_STATUS)"
            FAIL=1
          fi
          if ! [ "$RUNLOG_DELTA" -gt 0 ] 2>/dev/null; then
            echo "::error::latest dks_runlog row_count_delta is not > 0 (row_count_delta=$RUNLOG_DELTA)"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Phase 1b-harvest zero-output guardrail tripped for $SRC; failing task."
            exit 2
          fi
          echo ">>> Phase 1b-harvest guardrail passed for $SRC (delta=$SRC_DELTA, runlog_delta=$RUNLOG_DELTA)"
          EOS
              ;;
            *)
              echo "unknown phase: $PHASE" >&2; exit 1 ;;
          esac

          # Strip the 10-space YAML block indent that got prepended to every line
          sed -i 's/^          //' /tmp/phase/cmd.sh

          # Expand source-routing placeholders for 1a-stage and 1b phases.
          # Using a delimiter unlikely to appear in the values (|) and escaping
          # any stray '|' defensively.
          if [ "$PHASE" = "1a-stage" ] || [ "$PHASE" = "1b-harvest" ] || [ "$PHASE" = "1b-smoke" ]; then
            esc() { printf '%s' "$1" | sed 's/[\/&|]/\\&/g'; }
            sed -i \
              -e "s|__SRC__|$(esc "$SOURCE")|g" \
              -e "s|__CORPUS_DIR__|$(esc "$CORPUS_DIR")|g" \
              -e "s|__SRC_FLAG__|$(esc "$SOURCE_DIR_FLAG")|g" \
              -e "s|__DATASET_CANON__|$(esc "$DATASET_CANON")|g" \
              -e "s|__DATASET_ALT__|$(esc "$DATASET_ALT")|g" \
              -e "s|__STAGER__|$(esc "$STAGER_SCRIPT")|g" \
              /tmp/phase/cmd.sh
          fi

          echo "---- cmd.sh ----"
          cat /tmp/phase/cmd.sh
          echo "----------------"

          # Syntax check the generated script before shipping it to ECS.
          bash -n /tmp/phase/cmd.sh

          # Build overrides.json. The patched task def sets entryPoint=[/bin/bash,-c],
          # so overrides.command=[$cmd] is executed as: /bin/bash -c "$cmd".
          #
          # AWS ECS caps containerOverrides at 8192 bytes total (JSON-encoded).
          # To stay under the cap we gzip+base64 the phase script and pass a
          # tiny bootstrap that decodes and execs it in the container.
          CMD_B64=$(gzip -9 -c /tmp/phase/cmd.sh | base64 -w0)
          BOOTSTRAP="set -euo pipefail; printf %s \"$CMD_B64\" | base64 -d | gunzip | bash"

          # When MAX_DOCS is set, pass it as DKS_MAX_DOCS env override so the
          # in-container --max-docs resolution sees it (belt-and-braces with
          # the CLI flag — the harvester reads the env for legacy callers).
          # For 1b-smoke we also flip GEMMA_VERTEX_LOG_SAMPLES=1 so the extractor
          # dumps the raw :predict body on failure.
          # Bounded-harvester knobs (per_doc_timeout_sec, per_doc_max_attempts,
          # run_timeout_sec, progress_every_docs, progress_every_sec) are
          # forwarded as DKS_<NAME> env vars; the patched image reads them and
          # falls back to its built-in defaults when unset.
          ENV_JSON='[]'
          if [ -n "$MAX_DOCS" ]; then
            ENV_JSON=$(jq -c --arg max "$MAX_DOCS" '. + [{name:"DKS_MAX_DOCS",value:$max}]' <<<"$ENV_JSON")
          fi
          if [ "$PHASE" = "1b-smoke" ]; then
            ENV_JSON=$(jq -c '. + [{name:"GEMMA_VERTEX_LOG_SAMPLES",value:"1"}]' <<<"$ENV_JSON")
          fi
          if [ -n "$PER_DOC_TIMEOUT_SEC" ]; then
            ENV_JSON=$(jq -c --arg v "$PER_DOC_TIMEOUT_SEC" '. + [{name:"DKS_PER_DOC_TIMEOUT_SEC",value:$v}]' <<<"$ENV_JSON")
          fi
          if [ -n "$PER_DOC_MAX_ATTEMPTS" ]; then
            ENV_JSON=$(jq -c --arg v "$PER_DOC_MAX_ATTEMPTS" '. + [{name:"DKS_PER_DOC_MAX_ATTEMPTS",value:$v}]' <<<"$ENV_JSON")
          fi
          if [ -n "$RUN_TIMEOUT_SEC" ]; then
            ENV_JSON=$(jq -c --arg v "$RUN_TIMEOUT_SEC" '. + [{name:"DKS_RUN_TIMEOUT_SEC",value:$v}]' <<<"$ENV_JSON")
          fi
          if [ -n "$PROGRESS_EVERY_DOCS" ]; then
            ENV_JSON=$(jq -c --arg v "$PROGRESS_EVERY_DOCS" '. + [{name:"DKS_PROGRESS_EVERY_DOCS",value:$v}]' <<<"$ENV_JSON")
          fi
          if [ -n "$PROGRESS_EVERY_SEC" ]; then
            ENV_JSON=$(jq -c --arg v "$PROGRESS_EVERY_SEC" '. + [{name:"DKS_PROGRESS_EVERY_SEC",value:$v}]' <<<"$ENV_JSON")
          fi

          if [ "$(jq 'length' <<<"$ENV_JSON")" -gt 0 ]; then
            jq -n --arg cmd "$BOOTSTRAP" --argjson env "$ENV_JSON" '{
              containerOverrides: [{
                name: "dks-ingest",
                command: [$cmd],
                environment: $env
              }]
            }' > /tmp/phase/overrides.json
          else
            jq -n --arg cmd "$BOOTSTRAP" '{
              containerOverrides: [{
                name: "dks-ingest",
                command: [$cmd]
              }]
            }' > /tmp/phase/overrides.json
          fi
          OVERRIDE_BYTES=$(wc -c < /tmp/phase/overrides.json)
          echo "overrides size: ${OVERRIDE_BYTES} bytes (AWS limit: 8192)"
          if [ "$OVERRIDE_BYTES" -gt 8192 ]; then
            echo "::error::containerOverrides exceeds 8192 bytes (${OVERRIDE_BYTES}); ECS RunTask will fail"
            exit 1
          fi

      - name: Run ECS task
        id: run
        shell: bash
        run: |
          set -euo pipefail
          SUBNETS_CSV='${{ steps.net.outputs.subnets }}'
          SG='${{ steps.net.outputs.sg }}'

          # Build netcfg.json with jq — split comma-separated subnets into array
          jq -n --arg subs "$SUBNETS_CSV" --arg sg "$SG" '{
            awsvpcConfiguration: {
              subnets: ($subs | split(",") | map(select(length>0))),
              securityGroups: [$sg],
              assignPublicIp: "DISABLED"
            }
          }' > /tmp/phase/netcfg.json
          echo "Network config:"
          cat /tmp/phase/netcfg.json
          echo

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.net.outputs.cluster }}" \
            --launch-type FARGATE \
            --task-definition dks-ingest \
            --network-configuration "$(cat /tmp/phase/netcfg.json)" \
            --overrides file:///tmp/phase/overrides.json \
            --query 'tasks[0].taskArn' --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::run-task returned no ARN"
            exit 1
          fi

          TASK_ID="${TASK_ARN##*/}"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "task_id=$TASK_ID"   >> $GITHUB_OUTPUT
          echo "Task ARN: $TASK_ARN"
          echo "Task ID : $TASK_ID"

      - name: Poll for completion
        id: poll
        shell: bash
        env:
          INPUT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        run: |
          set -euo pipefail
          TASK_ARN="${{ steps.run.outputs.task_arn }}"
          TASK_ID="${{ steps.run.outputs.task_id }}"
          CLUSTER="${{ steps.net.outputs.cluster }}"

          # Phase-specific defaults (seconds). 1b-smoke is a bounded 8-doc run,
          # so 1200s (20m) is the ceiling; 1b-harvest keeps the full 90m budget.
          case "${{ inputs.phase }}" in
            1b-harvest) TIMEOUT=5400 ;;
            1b-smoke)   TIMEOUT=1200 ;;
            1a-stage)   TIMEOUT=3600 ;;
            *)          TIMEOUT=600  ;;
          esac
          if [ -n "${INPUT_TIMEOUT_MINUTES:-}" ] && [ "${INPUT_TIMEOUT_MINUTES}" -gt 0 ] 2>/dev/null; then
            TIMEOUT=$(( INPUT_TIMEOUT_MINUTES * 60 ))
            echo "Poll timeout overridden via input: ${TIMEOUT}s (${INPUT_TIMEOUT_MINUTES}m)"
          else
            echo "Poll timeout: ${TIMEOUT}s"
          fi

          ELAPSED=0
          INTERVAL=30
          STATUS=""
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            if [ "$STATUS" = "STOPPED" ]; then break; fi
            echo "[$((ELAPSED/60))m $((ELAPSED%60))s] status=$STATUS"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$STATUS" != "STOPPED" ]; then
            echo "::error::TIMED OUT: ECS task still ${STATUS} after ${TIMEOUT}s (phase=${{ inputs.phase }})"
            echo ""
            echo "=== describe-tasks (pre stop-task) ==="
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].{lastStatus:lastStatus,desiredStatus:desiredStatus,stoppedReason:stoppedReason,startedAt:startedAt,connectivity:connectivity,pullStartedAt:pullStartedAt,pullStoppedAt:pullStoppedAt,containers:containers[].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}' \
              --output json || true
            echo ""
            echo "=== CloudWatch tail (last 400 lines, pre stop-task) ==="
            STREAM="dks-ingest/dks-ingest/${TASK_ID}"
            aws logs tail /forge/ecs/dks-ingest \
              --log-stream-names "$STREAM" \
              --format short 2>&1 | tail -400 || echo "(logs unavailable pre-stop)"
            echo ""
            echo ">>> issuing stop-task after diagnostics capture"
            aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" --reason "workflow timeout after ${TIMEOUT}s" || true
            echo "exit_code=timeout" >> $GITHUB_OUTPUT
            exit 1
          fi

          EXIT=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "exit=$EXIT reason=$REASON"
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

      - name: Pull CloudWatch logs
        if: always() && steps.run.outputs.task_id != ''
        shell: bash
        run: |
          set +e
          STREAM="dks-ingest/dks-ingest/${{ steps.run.outputs.task_id }}"
          echo "=== /forge/ecs/dks-ingest :: $STREAM ==="
          # Dump full stream to file for artifact upload
          aws logs tail /forge/ecs/dks-ingest \
            --log-stream-names "$STREAM" \
            --format short > /tmp/phase/full.log 2>&1 || echo "(logs unavailable)" > /tmp/phase/full.log
          echo "--- first 200 lines ---"
          head -200 /tmp/phase/full.log
          echo
          echo "--- errors/exceptions/warnings (first 100 unique) ---"
          grep -iE "error|exception|traceback|403|401|unauth|permission|denied|fail" /tmp/phase/full.log | awk '!seen[$0]++' | head -100
          echo
          echo "--- last 200 lines ---"
          tail -200 /tmp/phase/full.log

      - name: Upload full log as artifact
        if: always() && steps.run.outputs.task_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: dks-phase-log-${{ inputs.phase }}-${{ inputs.source }}-${{ steps.run.outputs.task_id }}
          path: /tmp/phase/full.log
          retention-days: 7

      - name: Fail if task exited non-zero
        if: always()
        shell: bash
        run: |
          EXIT="${{ steps.poll.outputs.exit_code }}"
          if [ -z "$EXIT" ]; then EXIT="unknown"; fi
          echo "Phase ${{ inputs.phase }} (source=${{ inputs.source }}) exit code: $EXIT"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Phase ${{ inputs.phase }} (source=${{ inputs.source }}) failed (exit $EXIT)"
            exit 1
          fi
