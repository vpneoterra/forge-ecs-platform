# ================================================================
# run-dks-phase.yml — Execute DKS ingestion phases on Fargate
# ================================================================
name: "DKS: Run Phase"

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run"
        required: true
        type: choice
        options:
          - 0a-schema
          - bq-dryrun
          - 1a-bq
          - 1b-harvest
          - 1b-smoke
      env:
        description: "Target environment (cluster suffix)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
      max_docs:
        description: "Cap patent docs processed (blank = phase default; 1b-smoke defaults to 8)"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Override poll timeout in minutes (blank = phase default: 1b-harvest=90, 1b-smoke=20, others=10)"
        required: false
        type: string
        default: ""

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "266087050444"

jobs:
  run-phase:
    name: "Phase ${{ inputs.phase }} (${{ inputs.env }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve cluster + network config
        id: net
        env:
          TENV: ${{ inputs.env }}
        run: |
          set -euo pipefail
          CLUSTER="forge-app-${TENV}"
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
                      "Name=tag:aws-cdk:subnet-type,Values=Private" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',' || true)

          if [ -z "$SUBNETS" ]; then
            SUBNETS=$(aws ec2 describe-subnets \
              --filters "Name=tag:aws-cdk:subnet-type,Values=Private" \
              --query 'Subnets[0:2].SubnetId' --output text | tr '\t' ',')
          fi

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=*EcsSecurityGroup*" \
                      "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=*EcsSecurityGroup*" \
              --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          fi
          # Last-resort fallback to known-good SG for forge-app-dev
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG="sg-0871ce467d6c10739"
            echo "note: using hardcoded fallback SG $SG"
          fi

          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          echo "sg=$SG" >> $GITHUB_OUTPUT
          echo "Cluster : $CLUSTER"
          echo "Subnets : $SUBNETS"
          echo "SG      : $SG"

      - name: Verify dks-ingest task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition dks-ingest \
            --query 'taskDefinition.{family:family,rev:revision,image:containerDefinitions[0].image,env:containerDefinitions[0].environment[*].name,secrets:containerDefinitions[0].secrets[*].name}' \
            --output json

      - name: Write command script for phase
        id: cmd
        env:
          PHASE: ${{ inputs.phase }}
          INPUT_MAX_DOCS: ${{ inputs.max_docs }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase

          # Resolve DKS_MAX_DOCS: explicit input wins; otherwise 1b-smoke defaults to 8.
          MAX_DOCS=""
          if [ -n "${INPUT_MAX_DOCS:-}" ]; then
            MAX_DOCS="$INPUT_MAX_DOCS"
          elif [ "$PHASE" = "1b-smoke" ]; then
            MAX_DOCS="8"
          fi
          echo "max_docs=$MAX_DOCS" >> $GITHUB_OUTPUT
          echo "Resolved DKS_MAX_DOCS: '${MAX_DOCS:-<unset>}'"
          case "$PHASE" in
            0a-schema)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          echo ">>> applying sql/129_dks_knowledge_chunks.sql"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/sql/129_dks_knowledge_chunks.sql
          echo ">>> verify tables"
          psql "$DATABASE_URL" -c "\dt design_knowledge_chunks"
          psql "$DATABASE_URL" -c "\dt dks_runlog" || true
          psql "$DATABASE_URL" -c "select count(*) as baseline from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select indexname from pg_indexes where tablename='design_knowledge_chunks';"
          echo ">>> Phase 0a complete"
          EOS
              ;;
            bq-dryrun)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"
          echo ">>> BigQuery dry-run T1"
          python3 scripts/extract_bigquery.py --tier t1 --dry-run
          EOS
              ;;
            1a-bq)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC (BigQuery client needs this)
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"
          echo ">>> /data mount info:"
          df -T /data 2>&1 || echo "(df failed)"
          mount | grep -E "/data|efs" || echo "(no efs mount)"
          mkdir -p /data/patents_t1
          echo ">>> extract T1 1K patents"
          python3 scripts/extract_bigquery.py --tier t1 --output /data/patents_t1/ --local --force
          ls -la /data/patents_t1/
          wc -l /data/patents_t1/*.jsonl 2>/dev/null || true
          EOS
              ;;
            1b-harvest|1b-smoke)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          # Materialize GCP SA key for ADC (Vertex client needs this alongside env JSON fallback)
          mkdir -p /tmp/gcp
          printf '%s' "$GEMMA_VERTEX_SA_KEY_JSON" > /tmp/gcp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp/sa.json
          export GOOGLE_CLOUD_PROJECT="${GEMMA_VERTEX_PROJECT:-mindful-vial-493123-a5}"

          # ---- Vertex dedicated-DNS preflight ----
          # Fail fast (and cheaply) if the per-endpoint dedicated DNS host does
          # not resolve or TCP/443 is unreachable from the Fargate subnet. This
          # catches the prior "wrong project number baked into the host" class
          # of bug before we spend compute running the harvester.
          if [ "${GEMMA_VERTEX_DEDICATED_DNS:-false}" = "true" ]; then
            DNS_PREFIX="${GEMMA_VERTEX_DEDICATED_DNS_PREFIX:-${GEMMA_VERTEX_ENDPOINT_ID:-}}"
            PROJ_NUM="${GEMMA_VERTEX_PROJECT_NUMBER:-}"
            REGION="${GEMMA_VERTEX_REGION:-us-central1}"
            if [ -z "$DNS_PREFIX" ] || [ -z "$PROJ_NUM" ]; then
              echo "::error::dedicated DNS preflight: missing DNS_PREFIX or PROJECT_NUMBER"
              exit 3
            fi
            VERTEX_HOST="${DNS_PREFIX}.${REGION}-${PROJ_NUM}.prediction.vertexai.goog"
            echo ">>> vertex dedicated DNS preflight: $VERTEX_HOST"
            if ! getent hosts "$VERTEX_HOST" >/dev/null 2>&1; then
              echo "::error::DNS resolution failed for $VERTEX_HOST"
              exit 3
            fi
            # TCP 443 reachability via /dev/tcp (bash built-in, no extra deps)
            if ! timeout 5 bash -c ">/dev/tcp/${VERTEX_HOST}/443" 2>/dev/null; then
              echo "::error::TCP 443 unreachable for $VERTEX_HOST"
              exit 3
            fi
            echo ">>> preflight ok: $VERTEX_HOST resolves and accepts TCP/443"
          fi

          mkdir -p /data/logs
          LOG=/data/logs/phase1_$(date +%Y%m%d_%H%M%S).log

          # ---- Optional corpus cap for smoke runs ----
          # When DKS_MAX_DOCS is set, materialize a capped copy of the T1 corpus
          # at /data/patents_t1_capped/ so dks_harvest.py only sees the first N
          # JSON documents. JSONL shards are truncated to N lines across files
          # in lexical order; plain .json files are copied in order until the
          # per-file docs sum hits N. This keeps smoke runs bounded without
          # modifying the harvester.
          PATENTS_DIR=/data/patents_t1/
          if [ -n "${DKS_MAX_DOCS:-}" ] && [ "${DKS_MAX_DOCS}" -gt 0 ] 2>/dev/null; then
            CAP_DIR=/data/patents_t1_capped
            echo ">>> capping corpus to DKS_MAX_DOCS=$DKS_MAX_DOCS at $CAP_DIR"
            rm -rf "$CAP_DIR"
            mkdir -p "$CAP_DIR"
            REMAINING="$DKS_MAX_DOCS"
            # Prefer .jsonl shards (one doc per line) — truncate across files.
            for f in $(ls -1 /data/patents_t1/*.jsonl 2>/dev/null | sort); do
              [ "$REMAINING" -le 0 ] && break
              base=$(basename "$f")
              head -n "$REMAINING" "$f" > "$CAP_DIR/$base"
              taken=$(wc -l < "$CAP_DIR/$base" | tr -d ' ')
              REMAINING=$(( REMAINING - taken ))
              echo "  + $base took $taken (remaining=$REMAINING)"
            done
            # Fallback: copy whole .json files in order (1 doc/file assumption).
            if [ "$REMAINING" -gt 0 ]; then
              for f in $(ls -1 /data/patents_t1/*.json 2>/dev/null | sort); do
                [ "$REMAINING" -le 0 ] && break
                base=$(basename "$f")
                cp "$f" "$CAP_DIR/$base"
                REMAINING=$(( REMAINING - 1 ))
              done
            fi
            echo ">>> capped corpus contents:"
            ls -la "$CAP_DIR/" || true
            wc -l "$CAP_DIR"/*.jsonl 2>/dev/null || true
            PATENTS_DIR="$CAP_DIR/"
          fi

          # Baseline patent chunk count BEFORE harvest so we can diff after.
          BASELINE_PATENT_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where source_dataset='patents';")
          BASELINE_TOTAL_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks;")
          echo ">>> baseline patent chunks : $BASELINE_PATENT_CHUNKS"
          echo ">>> baseline total chunks  : $BASELINE_TOTAL_CHUNKS"

          echo ">>> harvest patents via vertex (patents-dir=$PATENTS_DIR)"
          python3 dks_harvest.py --source patents --patents-dir "$PATENTS_DIR" --backend vertex --validate 2>&1 | tee "$LOG"

          echo ">>> post-ingest counts"
          psql "$DATABASE_URL" -c "select count(*) as total_chunks from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select chunk_type, count(*) from design_knowledge_chunks group by chunk_type order by 2 desc;"
          psql "$DATABASE_URL" -c "select source_dataset, count(*) from design_knowledge_chunks group by source_dataset order by 2 desc limit 10;"
          psql "$DATABASE_URL" -c "select column_name, data_type from information_schema.columns where table_name='design_knowledge_chunks' order by ordinal_position;" || true
          psql "$DATABASE_URL" -c "select phase, source, status, backend, row_count_delta, duration_ms, cost_estimate_usd, created_at from dks_runlog order by created_at desc limit 5;"

          # ---- Zero-output guardrail ----
          # Fail the task if the harvest inserted zero patent chunks, even when
          # dks_harvest.py reported success. Checks two independent signals:
          #   1) design_knowledge_chunks row count for source_dataset='patents'
          #      must have grown vs. the pre-run baseline.
          #   2) The latest dks_runlog row for phase1b_harvest / patents must
          #      have status='success' AND row_count_delta > 0.
          echo ">>> validating row_count_delta and chunk growth"
          POST_PATENT_CHUNKS=$(psql "$DATABASE_URL" -At -c \
            "select coalesce(count(*),0) from design_knowledge_chunks where source_dataset='patents';")
          PATENT_DELTA=$(( POST_PATENT_CHUNKS - BASELINE_PATENT_CHUNKS ))
          echo "post patent chunks  : $POST_PATENT_CHUNKS"
          echo "patent chunk delta  : $PATENT_DELTA"

          RUNLOG_ROW=$(psql "$DATABASE_URL" -At -F '|' -c \
            "select coalesce(status,''), coalesce(row_count_delta,0)
               from dks_runlog
              where phase='phase1b_harvest' and source='patents'
              order by created_at desc
              limit 1;")
          RUNLOG_STATUS="${RUNLOG_ROW%%|*}"
          RUNLOG_DELTA="${RUNLOG_ROW##*|}"
          if [ -z "$RUNLOG_ROW" ]; then
            RUNLOG_STATUS="missing"; RUNLOG_DELTA="0"
          fi
          echo "runlog status       : $RUNLOG_STATUS"
          echo "runlog row_count_delta: $RUNLOG_DELTA"

          FAIL=0
          if [ "$PATENT_DELTA" -le 0 ]; then
            echo "::error::phase1b_harvest produced zero new patent chunks (delta=$PATENT_DELTA)"
            FAIL=1
          fi
          if [ "$RUNLOG_STATUS" != "success" ]; then
            echo "::error::latest dks_runlog row is not success (status=$RUNLOG_STATUS)"
            FAIL=1
          fi
          # Treat non-positive delta as failure even if runlog claims success.
          if ! [ "$RUNLOG_DELTA" -gt 0 ] 2>/dev/null; then
            echo "::error::latest dks_runlog row_count_delta is not > 0 (row_count_delta=$RUNLOG_DELTA)"
            FAIL=1
          fi
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Phase 1b-harvest zero-output guardrail tripped; failing task."
            exit 2
          fi
          echo ">>> Phase 1b-harvest guardrail passed (patent_delta=$PATENT_DELTA, runlog_delta=$RUNLOG_DELTA)"
          EOS
              ;;
            *)
              echo "unknown phase: $PHASE" >&2; exit 1 ;;
          esac

          # Strip the 10-space YAML block indent that got prepended to every line
          sed -i 's/^          //' /tmp/phase/cmd.sh

          echo "---- cmd.sh ----"
          cat /tmp/phase/cmd.sh
          echo "----------------"

          # Build overrides.json. The patched task def sets entryPoint=[/bin/bash,-c],
          # so overrides.command=[$cmd] is executed as: /bin/bash -c "$cmd".
          # When MAX_DOCS is set, pass it as DKS_MAX_DOCS env override so the
          # in-container corpus-cap block engages.
          # For 1b-smoke we also flip GEMMA_VERTEX_LOG_SAMPLES=1 so the extractor
          # dumps the raw :predict body on failure — full 1b-harvest leaves this
          # off by default to keep logs quiet.
          ENV_JSON='[]'
          if [ -n "$MAX_DOCS" ]; then
            ENV_JSON=$(jq -c --arg max "$MAX_DOCS" '. + [{name:"DKS_MAX_DOCS",value:$max}]' <<<"$ENV_JSON")
          fi
          if [ "$PHASE" = "1b-smoke" ]; then
            ENV_JSON=$(jq -c '. + [{name:"GEMMA_VERTEX_LOG_SAMPLES",value:"1"}]' <<<"$ENV_JSON")
          fi

          if [ "$(jq 'length' <<<"$ENV_JSON")" -gt 0 ]; then
            jq -n --rawfile cmd /tmp/phase/cmd.sh --argjson env "$ENV_JSON" '{
              containerOverrides: [{
                name: "dks-ingest",
                command: [$cmd],
                environment: $env
              }]
            }' > /tmp/phase/overrides.json
          else
            jq -n --rawfile cmd /tmp/phase/cmd.sh '{
              containerOverrides: [{
                name: "dks-ingest",
                command: [$cmd]
              }]
            }' > /tmp/phase/overrides.json
          fi
          echo "overrides size: $(wc -c < /tmp/phase/overrides.json) bytes"

      - name: Run ECS task
        id: run
        shell: bash
        run: |
          set -euo pipefail
          SUBNETS_CSV='${{ steps.net.outputs.subnets }}'
          SG='${{ steps.net.outputs.sg }}'

          # Build netcfg.json with jq — split comma-separated subnets into array
          jq -n --arg subs "$SUBNETS_CSV" --arg sg "$SG" '{
            awsvpcConfiguration: {
              subnets: ($subs | split(",") | map(select(length>0))),
              securityGroups: [$sg],
              assignPublicIp: "DISABLED"
            }
          }' > /tmp/phase/netcfg.json
          echo "Network config:"
          cat /tmp/phase/netcfg.json
          echo

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.net.outputs.cluster }}" \
            --launch-type FARGATE \
            --task-definition dks-ingest \
            --network-configuration "$(cat /tmp/phase/netcfg.json)" \
            --overrides file:///tmp/phase/overrides.json \
            --query 'tasks[0].taskArn' --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::run-task returned no ARN"
            exit 1
          fi

          TASK_ID="${TASK_ARN##*/}"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "task_id=$TASK_ID"   >> $GITHUB_OUTPUT
          echo "Task ARN: $TASK_ARN"
          echo "Task ID : $TASK_ID"

      - name: Poll for completion
        id: poll
        shell: bash
        env:
          INPUT_TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        run: |
          set -euo pipefail
          TASK_ARN="${{ steps.run.outputs.task_arn }}"
          TASK_ID="${{ steps.run.outputs.task_id }}"
          CLUSTER="${{ steps.net.outputs.cluster }}"

          # Phase-specific defaults (seconds). 1b-smoke is a bounded 8-doc run,
          # so 1200s (20m) is the ceiling; 1b-harvest keeps the full 90m budget.
          case "${{ inputs.phase }}" in
            1b-harvest) TIMEOUT=5400 ;;
            1b-smoke)   TIMEOUT=1200 ;;
            *)          TIMEOUT=600  ;;
          esac
          # Optional user override via timeout_minutes input.
          if [ -n "${INPUT_TIMEOUT_MINUTES:-}" ] && [ "${INPUT_TIMEOUT_MINUTES}" -gt 0 ] 2>/dev/null; then
            TIMEOUT=$(( INPUT_TIMEOUT_MINUTES * 60 ))
            echo "Poll timeout overridden via input: ${TIMEOUT}s (${INPUT_TIMEOUT_MINUTES}m)"
          else
            echo "Poll timeout: ${TIMEOUT}s"
          fi

          ELAPSED=0
          INTERVAL=30
          STATUS=""
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            if [ "$STATUS" = "STOPPED" ]; then break; fi
            echo "[$((ELAPSED/60))m $((ELAPSED%60))s] status=$STATUS"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$STATUS" != "STOPPED" ]; then
            echo "::error::TIMED OUT: ECS task still ${STATUS} after ${TIMEOUT}s (phase=${{ inputs.phase }})"
            echo ""
            echo "=== describe-tasks (pre stop-task) ==="
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].{lastStatus:lastStatus,desiredStatus:desiredStatus,stoppedReason:stoppedReason,startedAt:startedAt,connectivity:connectivity,pullStartedAt:pullStartedAt,pullStoppedAt:pullStoppedAt,containers:containers[].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}' \
              --output json || true
            echo ""
            echo "=== CloudWatch tail (last 400 lines, pre stop-task) ==="
            STREAM="dks-ingest/dks-ingest/${TASK_ID}"
            aws logs tail /forge/ecs/dks-ingest \
              --log-stream-names "$STREAM" \
              --format short 2>&1 | tail -400 || echo "(logs unavailable pre-stop)"
            echo ""
            echo ">>> issuing stop-task after diagnostics capture"
            aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" --reason "workflow timeout after ${TIMEOUT}s" || true
            echo "exit_code=timeout" >> $GITHUB_OUTPUT
            exit 1
          fi

          EXIT=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "exit=$EXIT reason=$REASON"
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

      - name: Pull CloudWatch logs
        if: always() && steps.run.outputs.task_id != ''
        shell: bash
        run: |
          set +e
          STREAM="dks-ingest/dks-ingest/${{ steps.run.outputs.task_id }}"
          echo "=== /forge/ecs/dks-ingest :: $STREAM ==="
          # Dump full stream to file for artifact upload
          aws logs tail /forge/ecs/dks-ingest \
            --log-stream-names "$STREAM" \
            --format short > /tmp/phase/full.log 2>&1 || echo "(logs unavailable)" > /tmp/phase/full.log
          echo "--- first 200 lines ---"
          head -200 /tmp/phase/full.log
          echo
          echo "--- errors/exceptions/warnings (first 100 unique) ---"
          grep -iE "error|exception|traceback|403|401|unauth|permission|denied|fail" /tmp/phase/full.log | awk '!seen[$0]++' | head -100
          echo
          echo "--- last 200 lines ---"
          tail -200 /tmp/phase/full.log

      - name: Upload full log as artifact
        if: always() && steps.run.outputs.task_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: dks-phase-log-${{ inputs.phase }}-${{ steps.run.outputs.task_id }}
          path: /tmp/phase/full.log
          retention-days: 7

      - name: Fail if task exited non-zero
        if: always()
        shell: bash
        run: |
          EXIT="${{ steps.poll.outputs.exit_code }}"
          if [ -z "$EXIT" ]; then EXIT="unknown"; fi
          echo "Phase ${{ inputs.phase }} exit code: $EXIT"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Phase ${{ inputs.phase }} failed (exit $EXIT)"
            exit 1
          fi
