# ================================================================
# run-dks-phase.yml — Execute DKS ingestion phases on Fargate
# ================================================================
name: "DKS: Run Phase"

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run"
        required: true
        type: choice
        options:
          - 0a-schema
          - bq-dryrun
          - 1a-bq
          - 1b-harvest
      env:
        description: "Target environment (cluster suffix)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "266087050444"

jobs:
  run-phase:
    name: "Phase ${{ inputs.phase }} (${{ inputs.env }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve cluster + network config
        id: net
        env:
          TENV: ${{ inputs.env }}
        run: |
          set -euo pipefail
          CLUSTER="forge-app-${TENV}"
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
                      "Name=tag:aws-cdk:subnet-type,Values=Private" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',' || true)

          if [ -z "$SUBNETS" ]; then
            SUBNETS=$(aws ec2 describe-subnets \
              --filters "Name=tag:aws-cdk:subnet-type,Values=Private" \
              --query 'Subnets[0:2].SubnetId' --output text | tr '\t' ',')
          fi

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=*EcsSecurityGroup*" \
                      "Name=tag:aws:cloudformation:stack-name,Values=ForgeNetwork-${TENV}" \
            --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || true)
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=*EcsSecurityGroup*" \
              --query 'SecurityGroups[0].GroupId' --output text)
          fi

          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          echo "sg=$SG" >> $GITHUB_OUTPUT
          echo "Cluster : $CLUSTER"
          echo "Subnets : $SUBNETS"
          echo "SG      : $SG"

      - name: Verify dks-ingest task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition dks-ingest \
            --query 'taskDefinition.{family:family,rev:revision,image:containerDefinitions[0].image,env:containerDefinitions[0].environment[*].name,secrets:containerDefinitions[0].secrets[*].name}' \
            --output json

      - name: Write command script for phase
        id: cmd
        env:
          PHASE: ${{ inputs.phase }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/phase
          case "$PHASE" in
            0a-schema)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          echo ">>> applying sql/129_dks_knowledge_chunks.sql"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/sql/129_dks_knowledge_chunks.sql
          echo ">>> verify tables"
          psql "$DATABASE_URL" -c "\dt design_knowledge_chunks"
          psql "$DATABASE_URL" -c "\dt dks_runlog" || true
          psql "$DATABASE_URL" -c "select count(*) as baseline from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select indexname from pg_indexes where tablename='design_knowledge_chunks';"
          echo ">>> Phase 0a complete"
          EOS
              ;;
            bq-dryrun)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          echo ">>> BigQuery dry-run T1"
          python3 scripts/extract_bigquery.py --tier t1 --dry-run
          EOS
              ;;
            1a-bq)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          mkdir -p /data/patents_t1
          echo ">>> extract T1 1K patents"
          python3 scripts/extract_bigquery.py --tier t1 --output /data/patents_t1/ --local --force
          ls -la /data/patents_t1/
          wc -l /data/patents_t1/*.jsonl 2>/dev/null || true
          EOS
              ;;
            1b-harvest)
              cat > /tmp/phase/cmd.sh <<'EOS'
          set -euo pipefail
          mkdir -p /data/logs
          LOG=/data/logs/phase1_$(date +%Y%m%d_%H%M%S).log
          echo ">>> harvest patents via vertex"
          python3 dks_harvest.py --source patents --patents-dir /data/patents_t1/ --backend vertex --validate 2>&1 | tee "$LOG"
          echo ">>> post-ingest counts"
          psql "$DATABASE_URL" -c "select count(*) filter (where source_type='patent') as patent_chunks, count(*) as total from design_knowledge_chunks;"
          psql "$DATABASE_URL" -c "select phase, status, inserted, skipped, failed, started_at, finished_at from dks_runlog order by started_at desc limit 5;"
          EOS
              ;;
            *)
              echo "unknown phase: $PHASE" >&2; exit 1 ;;
          esac

          # Strip the 10-space YAML block indent that got prepended to every line
          sed -i 's/^          //' /tmp/phase/cmd.sh

          echo "---- cmd.sh ----"
          cat /tmp/phase/cmd.sh
          echo "----------------"

          # Build overrides.json with jq (safely embeds multi-line cmd.sh as JSON string)
          jq -n --rawfile cmd /tmp/phase/cmd.sh '{
            containerOverrides: [{
              name: "dks-ingest",
              entryPoint: ["bash", "-c"],
              command: [$cmd]
            }]
          }' > /tmp/phase/overrides.json
          echo "overrides size: $(wc -c < /tmp/phase/overrides.json) bytes"

      - name: Run ECS task
        id: run
        shell: bash
        run: |
          set -euo pipefail
          SUBNETS_CSV='${{ steps.net.outputs.subnets }}'
          SG='${{ steps.net.outputs.sg }}'

          # Build netcfg.json with jq — split comma-separated subnets into array
          jq -n --arg subs "$SUBNETS_CSV" --arg sg "$SG" '{
            awsvpcConfiguration: {
              subnets: ($subs | split(",") | map(select(length>0))),
              securityGroups: [$sg],
              assignPublicIp: "DISABLED"
            }
          }' > /tmp/phase/netcfg.json
          echo "Network config:"
          cat /tmp/phase/netcfg.json
          echo

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.net.outputs.cluster }}" \
            --launch-type FARGATE \
            --task-definition dks-ingest \
            --network-configuration "$(cat /tmp/phase/netcfg.json)" \
            --overrides file:///tmp/phase/overrides.json \
            --query 'tasks[0].taskArn' --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::run-task returned no ARN"
            exit 1
          fi

          TASK_ID="${TASK_ARN##*/}"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "task_id=$TASK_ID"   >> $GITHUB_OUTPUT
          echo "Task ARN: $TASK_ARN"
          echo "Task ID : $TASK_ID"

      - name: Poll for completion
        id: poll
        shell: bash
        run: |
          set -euo pipefail
          TASK_ARN="${{ steps.run.outputs.task_arn }}"
          CLUSTER="${{ steps.net.outputs.cluster }}"

          case "${{ inputs.phase }}" in
            1b-harvest) TIMEOUT=5400 ;;
            *)          TIMEOUT=600  ;;
          esac

          ELAPSED=0
          INTERVAL=30
          STATUS=""
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            if [ "$STATUS" = "STOPPED" ]; then break; fi
            echo "[$((ELAPSED/60))m $((ELAPSED%60))s] status=$STATUS"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$STATUS" != "STOPPED" ]; then
            echo "::error::Task did not stop within ${TIMEOUT}s"
            aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" --reason "workflow timeout" || true
            exit 1
          fi

          EXIT=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "exit=$EXIT reason=$REASON"
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

      - name: Pull CloudWatch logs
        if: always() && steps.run.outputs.task_id != ''
        shell: bash
        run: |
          set +e
          STREAM="dks-ingest/dks-ingest/${{ steps.run.outputs.task_id }}"
          echo "=== /forge/ecs/dks-ingest :: $STREAM ==="
          aws logs tail /forge/ecs/dks-ingest \
            --log-stream-names "$STREAM" \
            --format short 2>&1 | tail -300 || echo "(logs unavailable)"

      - name: Fail if task exited non-zero
        if: always()
        shell: bash
        run: |
          EXIT="${{ steps.poll.outputs.exit_code }}"
          if [ -z "$EXIT" ]; then EXIT="unknown"; fi
          echo "Phase ${{ inputs.phase }} exit code: $EXIT"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Phase ${{ inputs.phase }} failed (exit $EXIT)"
            exit 1
          fi
