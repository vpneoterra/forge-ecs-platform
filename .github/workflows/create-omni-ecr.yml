name: Create OMNI ECR Repository

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  create-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repository
        run: |
          aws ecr create-repository \
            --repository-name omni \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE \
            --tags Key=Project,Value=OMNI Key=ManagedBy,Value=CDK Key=Owner,Value=vpneoterra \
            2>/dev/null || echo "Repository 'omni' may already exist"
          
          echo "ECR repository 'omni' ready:"
          aws ecr describe-repositories --repository-names omni --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' --output text

      - name: Create Secrets Manager secret for OMNI API key
        run: |
          aws secretsmanager create-secret \
            --name "forge/dev/omni-api-key" \
            --description "OMNI PicoGK API key (dev)" \
            --secret-string "omni-dev-$(openssl rand -hex 16)" \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Secret 'forge/dev/omni-api-key' may already exist"
          echo "Secret 'forge/dev/omni-api-key' ready"
