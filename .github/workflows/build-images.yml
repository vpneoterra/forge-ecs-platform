name: Build & Push Images

on:
  workflow_dispatch:
    inputs:
      target_image:
        description: 'Specific image to build (leave empty for all)'
        required: false
        default: ''
      target_env:
        # Which environment's ECR repos to push to.
        # 'dev'  (default) = blue/live behavior, UNCHANGED (pushes to <name>).
        # 'dev2' = green    = pushes to the env-scoped <name>-dev2 repos so
        #          green tracks its own builds without touching blue images.
        description: 'Target env: dev (blue, default) or dev2 (green)'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - dev2
  schedule:
    # Weekly Monday 6am UTC — refresh base images (blue/dev only)
    - cron: '0 6 * * 1'

env:
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: forge-lightweight
            repo: forge-cluster-a-geometry
            dockerfile: Dockerfile
            platforms: linux/arm64  # ARM64 for Graviton (Provider A)

          - name: forge-devops
            repo: forge-cluster-f-devops
            dockerfile: Dockerfile
            platforms: linux/arm64
            # Build context lives in THIS repo (docker/cluster-f-devops),
            # not in a separate source repo. Pushes to ECR repo `forge-devops`.
            local_context: docker/cluster-f-devops

          - name: forge-monitoring
            repo: forge-cluster-c-observability
            dockerfile: Dockerfile
            platforms: linux/arm64

          - name: forge-hpc
            repo: forge-cluster-b-hpc
            dockerfile: Dockerfile
            platforms: linux/amd64  # x86_64 for Provider B

          - name: forge-fem-cfd
            repo: forge-cluster-d-fem
            dockerfile: Dockerfile
            platforms: linux/amd64

          - name: forge-stellarator-config
            repo: forge-stellarator-config
            dockerfile: Dockerfile
            platforms: linux/arm64  # Provider A

          - name: forge-stellarator-coils
            repo: forge-stellarator-coils
            dockerfile: Dockerfile
            platforms: linux/amd64  # Provider B

          - name: forge-stellarator-cad
            repo: forge-stellarator-cad
            dockerfile: Dockerfile
            platforms: linux/amd64

          # lucid and dks-query ARE env-scoped: dedicated lucid-dev2 and
          # dks-query-dev2 ECR repos now exist, so green builds its own copies
          # on a dev2 run (blue/dev still pushes to the bare repos). dks-ingest
          # stays shared (no dks-ingest consumer in green app services; the
          # forgenew build-image.yml owns dks-ingest-dev2 if/when needed).
          - name: lucid
            repo: LUCID
            dockerfile: Dockerfile
            platforms: linux/amd64

          - name: dks-query
            repo: forge-dks
            dockerfile: Dockerfile.query
            platforms: linux/amd64

          # Shared (NOT env-scoped): no -dev2 counterpart consumed by green.
          # env_scoped: false means it is skipped on a dev2-targeted run.
          - name: dks-ingest
            repo: forge-dks
            dockerfile: Dockerfile.ingest
            platforms: linux/amd64
            env_scoped: false

    steps:
      - name: Check if this image should build
        id: filter
        run: |
          TARGET="${{ github.event.inputs.target_image }}"
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          ENV_SCOPED="${{ matrix.image.env_scoped }}"   # '' (true) or 'false'
          SHOULD=true
          # Image-name filter
          if [ -n "$TARGET" ] && [ "$TARGET" != "${{ matrix.image.name }}" ]; then
            SHOULD=false
          fi
          # On a dev2 (green) run, skip images that are NOT env-scoped
          # (they have no <name>-dev2 ECR repo; green shares blue's repo).
          if [ "$TARGET_ENV" = "dev2" ] && [ "$ENV_SCOPED" = "false" ]; then
            echo "Skipping ${{ matrix.image.name }} on dev2 run (shared repo, no -dev2 variant)."
            SHOULD=false
          fi
          echo "should_build=$SHOULD" >> $GITHUB_OUTPUT

      # Source-repo checkout (skipped for images whose context is in this repo).
      - uses: actions/checkout@v4
        if: steps.filter.outputs.should_build == 'true' && matrix.image.local_context == ''
        with:
          repository: vpneoterra/${{ matrix.image.repo }}
          token: ${{ secrets.GH_PAT }}
          path: image-source

      # In-repo checkout for images built from a local context (e.g. forge-devops).
      - uses: actions/checkout@v4
        if: steps.filter.outputs.should_build == 'true' && matrix.image.local_context != ''
        with:
          path: image-source

      - name: Set up QEMU (for multi-arch builds)
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: steps.filter.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.should_build == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          # Env-scope the ECR repo name. dev (default) keeps the bare repo name
          # byte-for-byte (blue unchanged). dev2 appends -dev2 (green's repos).
          # Scheduled runs have no inputs, so default to '' (blue) safely.
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          ENV_SUFFIX=""
          if [ "$TARGET_ENV" = "dev2" ]; then ENV_SUFFIX="-dev2"; fi
          REPO_NAME="${{ matrix.image.name }}${ENV_SUFFIX}"
          ECR_URI=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${REPO_NAME}
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "Target env: ${TARGET_ENV:-dev}  ->  ECR repo: ${REPO_NAME}"
          echo "build_date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Resolve build context
        if: steps.filter.outputs.should_build == 'true'
        id: ctx
        run: |
          if [ -n "${{ matrix.image.local_context }}" ]; then
            echo "context=./image-source/${{ matrix.image.local_context }}" >> $GITHUB_OUTPUT
            echo "file=./image-source/${{ matrix.image.local_context }}/${{ matrix.image.dockerfile }}" >> $GITHUB_OUTPUT
          else
            echo "context=./image-source" >> $GITHUB_OUTPUT
            echo "file=./image-source/${{ matrix.image.dockerfile }}" >> $GITHUB_OUTPUT
          fi

      # Pre-build existence guard (modeled on build-geometry-images.yml). Several
      # source repos (forge-cluster-a-geometry/forge-lightweight, -c-observability/
      # forge-monitoring, -b-hpc/forge-hpc, -d-fem/forge-fem-cfd) have NO root
      # Dockerfile yet, so buildx fails with 'open Dockerfile: no such file' (exit 1).
      # Instead of failing the whole workflow, mark THIS matrix entry SKIPPED with a
      # ::warning:: so the images that CAN build (forge-devops, lucid, dks-query) go
      # GREEN, while the missing-Dockerfile entries are clearly flagged (not hidden).
      # Matrix entries are kept so they auto-recover once the upstream Dockerfile lands.
      - name: Verify Dockerfile exists in source
        id: dfcheck
        if: steps.filter.outputs.should_build == 'true'
        run: |
          DF="${{ steps.ctx.outputs.file }}"
          if [ ! -f "$DF" ]; then
            echo "::warning::Dockerfile ${DF#./image-source/} not found in source repo ${{ matrix.image.repo }} — SKIPPING build for ${{ matrix.image.name }} (upstream repo has no Dockerfile yet). This entry will build automatically once the Dockerfile lands."
            echo "build_ok=false" >> $GITHUB_OUTPUT
          else
            echo "Found $DF for ${{ matrix.image.name }}"
            echo "build_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.filter.outputs.should_build == 'true' && steps.dfcheck.outputs.build_ok == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.file }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:latest
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.git_sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}

      - name: Image vulnerability scan summary
        if: steps.filter.outputs.should_build == 'true' && steps.dfcheck.outputs.build_ok == 'true'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Checking ECR scan results for ${{ steps.meta.outputs.repo_name }}..."
          # Brief wait for scan to complete (non-blocking — just informational)
          sleep 30
          aws ecr describe-image-scan-findings \
            --repository-name ${{ steps.meta.outputs.repo_name }} \
            --image-id imageTag=latest \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output table 2>/dev/null || echo "Scan not yet complete — check ECR console"

  notify:
    name: Notify build complete
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| All 10 FORGE images | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
