name: Build & Push OMNI Image (forge-omni) + Deploy

# Builds docker/omni/Dockerfile from forgenew@main (or specified ref) and pushes
# to the CANONICAL OMNI ECR repo `forge-omni` — the repo ForgeAppStack's
# forge-omni service actually pulls (lib/forge-app-stack.ts OmniRepo). Then the
# `deploy` job rolls that service by registering a NEW task-def revision pinned
# to the pushed @sha256 digest via the existing CDK digest-pin path
# (-c forgeOmniImageDigest), so ECS auto-rolls to the freshly built image.
#
# [RC-3] ROOT CAUSE this closes: the build previously pushed to the ORPHAN repo
# `omni-dev2` and only PRINTED the digest — there was no register-task-definition
# / update-service step, so the live service never ran the newly built code, and
# the orphan omni-dev2 task def stayed pinned to a digest that ECR lifecycle GC'd
# (CannotPullContainerError, 0 running tasks). Building the canonical repo and
# wiring the digest-pinned CDK deploy closes the build→deploy gap. Digest is
# hard-required for the deploy; if it is empty the deploy FAILS (no :latest).
#
# RC2-A: tags IMMUTABLE only (:YYYYMMDD-HHMMSS + :sha8), NEVER :latest.

on:
  workflow_dispatch:
    inputs:
      forgenew_ref:
        description: 'forgenew git ref to build (branch, tag, or full SHA)'
        required: false
        default: 'main'
      dry_run:
        description: 'Dry run — build but do not push (deploy is skipped)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      env_name:
        description: 'Target env for the ECS rollout (cluster forge-app-<env>, service forge-omni)'
        required: false
        default: 'dev2'

env:
  AWS_REGION: us-east-1
  ECR_REPO: forge-omni          # CANONICAL repo the forge-omni service pulls (RC-1/RC-3)

jobs:
  build:
    name: Build Standalone OMNI (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      # Idempotent re-run: if the SHA tag already exists in ECR we skip the build/push
      # and surface the EXISTING digest (steps.tagcheck) so the roll-to-digest job still works.
      image_digest: ${{ steps.push.outputs.digest || steps.tagcheck.outputs.digest }}
      ecr_uri:      ${{ steps.meta.outputs.ecr_uri }}
      sha8:         ${{ steps.meta.outputs.sha8 }}
      build_date:   ${{ steps.meta.outputs.build_date }}

    steps:
      - name: Checkout forgenew @ ref
        uses: actions/checkout@v4
        with:
          repository: vpneoterra/forgenew
          ref: ${{ github.event.inputs.forgenew_ref || 'main' }}
          token: ${{ secrets.GH_PAT }}
          path: image-source

      - name: Verify OMNI Dockerfile exists
        run: |
          if [ ! -f image-source/docker/omni/Dockerfile ]; then
            echo "::error::image-source/docker/omni/Dockerfile not found on ref '${{ github.event.inputs.forgenew_ref || 'main' }}'."
            exit 1
          fi
          echo "Dockerfile found. Pinned upstream SHAs:"
          grep -E 'git checkout' image-source/docker/omni/Dockerfile | head -10 || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure forge-omni ECR repo exists and enforce IMMUTABLE tags (RC2-A / RC-3)
        run: |
          set -euo pipefail
          # RC2-A/RC-3: tags MUST be IMMUTABLE so a push can never silently
          # overwrite the digest a live deployment pinned. If the repo must be
          # created here, create it IMMUTABLE; if it already exists MUTABLE, flip
          # it to IMMUTABLE so the canonical forge-omni repo cannot regress to the
          # mutable-tag failure mode (program 253f20a6).
          if aws ecr describe-repositories \
               --repository-names "${ECR_REPO}" \
               --region "${AWS_REGION}" >/dev/null 2>&1; then
            MUT=$(aws ecr describe-repositories \
              --repository-names "${ECR_REPO}" --region "${AWS_REGION}" \
              --query 'repositories[0].imageTagMutability' --output text)
            echo "ECR repo ${ECR_REPO} exists with imageTagMutability=${MUT}"
            if [ "${MUT}" != "IMMUTABLE" ]; then
              echo "Enforcing IMMUTABLE tag mutability on ${ECR_REPO} (was ${MUT})."
              aws ecr put-image-tag-mutability \
                --repository-name "${ECR_REPO}" \
                --image-tag-mutability IMMUTABLE \
                --region "${AWS_REGION}" >/dev/null
            fi
          else
            aws ecr create-repository \
              --repository-name "${ECR_REPO}" \
              --region "${AWS_REGION}" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability IMMUTABLE \
              --tags Key=Project,Value=Omni Key=ManagedBy,Value=CDK
          fi
          echo "ECR repo ${ECR_REPO} confirmed IMMUTABLE."

      - name: Set image metadata
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          SHA8=$(git -C image-source rev-parse --short=8 HEAD)
          # Emit under both names so all references resolve (sha8 used by job outputs, git_sha by tags)
          echo "sha8=${SHA8}" >> $GITHUB_OUTPUT
          echo "git_sha=${SHA8}" >> $GITHUB_OUTPUT

      # IDEMPOTENT GUARD: the SHA tag is IMMUTABLE, so re-running on an unchanged commit
      # would re-push an existing tag and fail with 'tag already exists ... cannot be
      # overwritten'. Check whether the :sha8 tag is already in ECR; if so, treat it as
      # SUCCESS (set exists=true + surface the existing digest) and skip the build/push.
      - name: Check if SHA tag already exists in ECR (idempotent re-run guard)
        id: tagcheck
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          SHA8="${{ steps.meta.outputs.git_sha }}"
          if EXISTING=$(aws ecr describe-images \
              --repository-name "${ECR_REPO}" \
              --image-ids imageTag="${SHA8}" \
              --region "${AWS_REGION}" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null) && [ -n "${EXISTING}" ] && [ "${EXISTING}" != "None" ]; then
            echo "::notice::forge-omni:${SHA8} already exists in ECR (digest ${EXISTING}). Skipping build/push (idempotent); roll-to-digest will use the existing digest."
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "digest=${EXISTING}" >> $GITHUB_OUTPUT
          else
            echo "forge-omni:${SHA8} not found in ECR — proceeding to build and push."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Standalone OMNI image (IMMUTABLE tags only -- RC2-A)
        id: push
        if: github.event.inputs.dry_run == 'true' || steps.tagcheck.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context:    ./image-source/docker/omni
          file:       ./image-source/docker/omni/Dockerfile
          platforms:  linux/amd64
          push:       ${{ github.event.inputs.dry_run != 'true' }}
          # RC2-A: NO `:latest`. Only immutable, content-addressed tags. The CD
          # path deploys by the pushed @sha256 digest (printed below); `:latest`
          # is exactly the mutable reference that bricked the fleet (the pinned
          # digest was overwritten then GC'd). Pushing `:latest` to an IMMUTABLE
          # repo would also fail on the second build.
          tags: |
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.git_sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.ecr_uri }}:cache,mode=max
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}

      - name: Verify pushed image is real (not empty/layerless) -- RC2-C
        if: github.event.inputs.dry_run != 'true' && steps.tagcheck.outputs.exists != 'true'
        env:
          ECR_URI: ${{ steps.meta.outputs.ecr_uri }}
          DIGEST:  ${{ steps.push.outputs.digest }}
          # Real OMNI images are ~1.7 GB. 47 of 81 historical images were
          # sub-1 MB empty/manifest-only pushes (RC2-C). Floor well above any
          # manifest-only artifact but below a real build.
          MIN_IMAGE_BYTES: '524288000'   # 500 MB
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "::error::No image digest was produced by the build/push step. Refusing to proceed (RC2-C: a layerless/empty build must fail before deploy)."
            exit 1
          fi
          echo "Inspecting pushed manifest ${ECR_URI}@${DIGEST} ..."
          # imageSizeInBytes is the sum of all compressed layer blob sizes for the
          # image. A layerless/manifest-only push reports a near-zero size.
          SIZE=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --image-ids imageDigest="${DIGEST}" \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageSizeInBytes' \
            --output text)
          echo "Reported imageSizeInBytes=${SIZE} (floor=${MIN_IMAGE_BYTES})"
          if [ "${SIZE}" = "None" ] || [ -z "${SIZE}" ]; then
            echo "::error::ECR reports no size for ${DIGEST} -- the pushed artifact has no layers (RC2-C). Failing the build before any deploy."
            exit 1
          fi
          if [ "${SIZE}" -lt "${MIN_IMAGE_BYTES}" ]; then
            echo "::error::Pushed image is ${SIZE} bytes, below the ${MIN_IMAGE_BYTES}-byte floor for a real OMNI image (RC2-C: empty/manifest-only push). Failing before deploy."
            exit 1
          fi
          echo "Pushed image size verification passed."

      - name: Print pushed image digest
        if: github.event.inputs.dry_run != 'true' && steps.tagcheck.outputs.exists != 'true'
        run: |
          echo "================================================="
          echo "PUSHED IMAGE DIGEST (used by the deploy job below):"
          echo "${{ steps.push.outputs.digest }}"
          echo "Full URI by digest:"
          echo "${{ steps.meta.outputs.ecr_uri }}@${{ steps.push.outputs.digest }}"
          echo "Deploy pins it via: cdk deploy ForgeApp-<env> -c forgeOmniImageDigest=${{ steps.push.outputs.digest }}"
          echo "================================================="

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Standalone OMNI Build"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| forgenew ref | ${{ github.event.inputs.forgenew_ref || 'main' }} |"
            echo "| git SHA8 | ${{ steps.meta.outputs.git_sha }} |"
            echo "| ECR repo | ${{ env.ECR_REPO }} |"
            echo "| Tags | ${{ steps.meta.outputs.build_date }}, ${{ steps.meta.outputs.git_sha }} (no :latest -- RC2-A) |"
            echo "| Digest | ${{ steps.push.outputs.digest }} |"
            echo "| Dry run | ${{ github.event.inputs.dry_run }} |"
            echo "| Result | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # [RC-3] ECS rollout: register a NEW task-def revision pinned to the pushed
  # @sha256 digest and roll the CANONICAL forge-omni service. Uses the existing
  # CDK digest-pin path (resolveEcrImage reads -c forgeOmniImageDigest), so CDK
  # synthesizes a new OmniTaskDef revision and ECS auto-rolls the service to it.
  deploy:
    name: Roll forge-omni to the pushed digest
    needs: build
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
      ENV_NAME: ${{ github.event.inputs.env_name || 'dev2' }}
    steps:
      - uses: actions/checkout@v4

      - name: Require a resolvable digest (RC-3 — no :latest fallback)
        run: |
          set -euo pipefail
          # Hard-fail if the build produced no digest. A deploy MUST pin an exact
          # immutable image; there is no :latest fallback (RC2-A/RC2-C/RC-3).
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::build job produced no image_digest — refusing to deploy (RC-3: a rollout must pin an exact @sha256 digest, never :latest)."
            exit 1
          fi
          if ! echo "${IMAGE_DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::image_digest '${IMAGE_DIGEST}' is not a full sha256:<64-hex> digest. Refusing to deploy (no coercion)."
            exit 1
          fi
          echo "Deploying forge-omni pinned to ${IMAGE_DIGEST}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CDK dependencies
        run: npm ci

      - name: CDK deploy ForgeApp (pin forge-omni to pushed digest)
        run: |
          set -euo pipefail
          # resolveEcrImage(this, omniEcrRepo, 'forgeOmni') reads forgeOmniImageDigest
          # and emits a digest-pinned EcrImage, so this synthesizes a new OmniTaskDef
          # revision and ECS rolls the forge-omni service to the freshly built image.
          npx cdk deploy "ForgeApp-${ENV_NAME}" \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            -c env="${ENV_NAME}" \
            -c deployApp=true \
            -c appDomain=forge.qrucible.ai \
            -c skipRds=true \
            -c forgeOmniImageDigest="${IMAGE_DIGEST}"

      - name: Wait for forge-omni rollout to stabilize
        run: |
          set -euo pipefail
          CLUSTER="forge-app-${ENV_NAME}"
          echo "Waiting for ${CLUSTER}/forge-omni to reach steady state on the new task def..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services forge-omni \
            --region "${AWS_REGION}"
          aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services forge-omni \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,taskDef:taskDefinition}' \
            --output table
